<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#07070e"/>
  <title>✝ 설교 번역</title>
  <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&family=Noto+Serif+KR:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    /* ── 테마 변수 ── */
    :root {
      --fs: 24px;
    }

    /* 다크 모드 (기본) */
    [data-theme="dark"] {
      --bg:         #07070e;
      --bg2:        #0e0e1a;
      --surface:    rgba(255,255,255,.04);
      --border:     rgba(255,255,255,.07);
      --gold:       #c9a84c;
      --gold-dim:   rgba(201,168,76,.15);
      --text:       #ede5d4;
      --text-prev:  #2a2a3e;
      --text-sub:   #3a3a55;
      --dim:        #4a5070;
      --cross:      #14141f;
      --shadow:     rgba(0,0,0,.6);
      --status-bg:  rgba(10,10,20,.85);
      --offline-bg: #3a0f0f;
      --offline-bd: #6a2020;
      --offline-tx: #fca5a5;
      --overlay-bg: rgba(7,7,14,.93);
    }

    /* 라이트 모드 */
    [data-theme="light"] {
      --bg:         #faf7f2;
      --bg2:        #f0ebe1;
      --surface:    rgba(0,0,0,.04);
      --border:     rgba(0,0,0,.1);
      --gold:       #9a6e20;
      --gold-dim:   rgba(154,110,32,.12);
      --text:       #1a1208;
      --text-prev:  #c8bfa8;
      --text-sub:   #b0a488;
      --dim:        #8a7e68;
      --cross:      #ddd4c0;
      --shadow:     rgba(0,0,0,.12);
      --status-bg:  rgba(250,247,242,.9);
      --offline-bg: #fff0f0;
      --offline-bd: #ffaaaa;
      --offline-tx: #cc3333;
      --overlay-bg: rgba(250,247,242,.95);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif KR', 'Malgun Gothic', serif;
      transition: background .35s, color .35s;
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ── 상단 바 ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      top: env(safe-area-inset-top);
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--status-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      transition: background .35s, border-color .35s;
    }

    /* 연결 상태 */
    .conn-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: all .35s;
    }
    .conn-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--dim); transition: all .4s; flex-shrink: 0;
    }
    .conn-dot.connected  { background: #4ade80; box-shadow: 0 0 7px #4ade80; animation: blink 2s infinite; }
    .conn-dot.connecting { background: var(--gold); animation: blink .8s infinite; }
    .conn-dot.offline    { background: #f87171; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .conn-txt { font-size: 11px; color: var(--dim); letter-spacing: .08em; font-family: 'Noto Sans KR', sans-serif; }

    /* 오른쪽 버튼 그룹 */
    .topbar-right { display: flex; align-items: center; gap: 8px; }

    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--dim);
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all .2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .icon-btn:active { transform: scale(.9); background: var(--gold-dim); }

    /* 테마 토글 */
    .theme-btn { font-size: 18px; }

    /* ── 오프라인 배너 ── */
    .offline-bar {
      position: fixed;
      top: calc(52px + env(safe-area-inset-top));
      left: 0; right: 0;
      background: var(--offline-bg);
      border-bottom: 1px solid var(--offline-bd);
      color: var(--offline-tx);
      font-size: 12px;
      padding: 8px 16px;
      text-align: center;
      display: none; z-index: 99;
      font-family: 'Noto Sans KR', sans-serif;
      transition: background .35s;
    }
    .offline-bar.show { display: block; }

    /* ── 메인 스크롤 영역 ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 80px 0 40px;
      -webkit-overflow-scrolling: touch;
    }

    .inner {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── 대기 화면 ── */
    .waiting {
      min-height: 60vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; text-align: center;
    }
    .cross-icon {
      font-size: 56px;
      color: var(--cross);
      transition: color .35s;
      line-height: 1;
    }
    .waiting-txt {
      font-size: 16px;
      color: var(--text-sub);
      line-height: 1.9;
      font-family: 'Noto Sans KR', sans-serif;
      transition: color .35s;
    }

    /* ── 번역 텍스트 ── */
    .main-text {
      font-size: var(--fs);
      line-height: 2.1;
      color: var(--text);
      word-break: keep-all;
      letter-spacing: .015em;
      padding: 8px 0 32px;
      min-height: 50vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      transition: color .35s;
    }
    .main-text.hidden { display: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .appear { animation: fadeUp .5s cubic-bezier(.16,1,.3,1) forwards; }

    /* ── 구분선 ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 8px 0 24px;
      transition: background .35s;
    }

    /* ── 이전 내용 ── */
    .prev-section { padding-bottom: 48px; }
    .prev-label {
      font-size: 9px;
      color: var(--text-sub);
      letter-spacing: .2em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 20px;
      font-family: 'Noto Sans KR', sans-serif;
      opacity: .5;
    }
    .prev-item {
      color: var(--text-prev);
      font-size: 15px;
      line-height: 1.9;
      margin-bottom: 20px;
      word-break: keep-all;
      text-align: center;
      transition: color .35s;
    }

    /* ── 하단 폰트 조절 바 ── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      bottom: env(safe-area-inset-bottom);
      padding: 10px 20px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: var(--status-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      gap: 12px; z-index: 100;
      transition: background .35s, border-color .35s;
    }
    .fs-label { font-size: 11px; color: var(--dim); font-family: 'Noto Sans KR', sans-serif; }
    .fs-btn {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--dim);
      font-size: 14px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all .2s;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .fs-btn:active { transform: scale(.88); background: var(--gold-dim); color: var(--gold); }

    .fs-display {
      min-width: 48px; text-align: center;
      font-size: 13px; color: var(--dim);
      font-family: 'Noto Sans KR', sans-serif;
    }

    /* ── 재연결 오버레이 ── */
    .reconnect-overlay {
      position: fixed; inset: 0;
      background: var(--overlay-bg);
      backdrop-filter: blur(8px);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; z-index: 200;
      font-family: 'Noto Sans KR', sans-serif;
      transition: background .35s;
    }
    .reconnect-overlay.show { display: flex; }
    .spinner {
      width: 52px; height: 52px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .reconnect-msg  { font-size: 15px; color: var(--dim); }
    .reconnect-sub  { font-size: 12px; color: var(--gold); }

    /* ── 스크롤바 ── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- 상단 바 -->
<div class="topbar">
  <div class="conn-pill">
    <div id="sDot" class="conn-dot connecting"></div>
    <span id="sTxt" class="conn-txt">연결 중...</span>
  </div>
  <div class="topbar-right">
    <div class="icon-btn theme-btn" onclick="toggleTheme()" title="다크/라이트 모드">
      <span id="themeIcon">☀️</span>
    </div>
  </div>
</div>

<!-- 오프라인 배너 -->
<div id="offlineBar" class="offline-bar">
  📶 인터넷 연결이 끊겼습니다 — 자동으로 재연결합니다
</div>

<!-- 메인 스크롤 영역 -->
<div class="scroll-area">
  <div class="inner">

    <!-- 대기 -->
    <div id="waiting" class="waiting">
      <div class="cross-icon">✝</div>
      <div class="waiting-txt">설교 번역을 기다리는 중입니다...</div>
    </div>

    <!-- 번역 텍스트 -->
    <div id="mainTxt" class="main-text hidden"></div>

    <!-- 이전 내용 -->
    <div id="prevSec" style="display:none;">
      <div class="divider"></div>
      <div class="prev-section">
        <div class="prev-label">이전 내용</div>
        <div id="prevList"></div>
      </div>
    </div>

  </div>
</div>

<!-- 하단 폰트 조절 바 -->
<div class="bottom-bar">
  <button class="fs-btn" onclick="changeFontSize(-2)">A−</button>
  <span class="fs-display" id="fsDisplay">24px</span>
  <button class="fs-btn" onclick="changeFontSize(+2)">A+</button>
  <span class="fs-label" style="margin-left:8px;">글자 크기</span>
</div>

<!-- 재연결 오버레이 -->
<div id="reconnectOverlay" class="reconnect-overlay">
  <div class="spinner"></div>
  <div class="reconnect-msg">연결이 끊겼습니다</div>
  <div id="reconnectSub" class="reconnect-sub">재연결 중...</div>
</div>

<script>
  /* ── 테마 ── */
  const savedTheme = localStorage.getItem('sermon-theme') || 'dark';
  setTheme(savedTheme);

  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('themeIcon').textContent = t === 'dark' ? '☀️' : '🌙';
    document.querySelector('meta[name="theme-color"]').content = t === 'dark' ? '#07070e' : '#faf7f2';
    localStorage.setItem('sermon-theme', t);
  }

  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    setTheme(cur === 'dark' ? 'light' : 'dark');
  }

  /* ── 폰트 크기 ── */
  let fontSize = parseInt(localStorage.getItem('sermon-fs') || 24);
  applyFontSize();

  function changeFontSize(d) {
    fontSize = Math.max(14, Math.min(54, fontSize + d));
    applyFontSize();
    localStorage.setItem('sermon-fs', fontSize);
  }

  function applyFontSize() {
    document.documentElement.style.setProperty('--fs', fontSize + 'px');
    document.getElementById('fsDisplay').textContent = fontSize + 'px';
  }

  /* ── 마지막 번역 복원 ── */
  const saved = localStorage.getItem('sermon-last');
  if (saved) {
    document.getElementById('waiting').style.display = 'none';
    const el = document.getElementById('mainTxt');
    el.classList.remove('hidden');
    el.textContent = saved;
  }

  /* ── Pusher 설정 ── */
  const PUSHER_KEY     = '9970878443f485296baf';      // ← 여기에 Pusher Key 입력
  const PUSHER_CLUSTER = 'mt1';  // ← 여기에 Pusher Cluster 입력

  const prevTexts = [];
  let pusher = null;
  let retryCount = 0;
  let retryTimer = null;

  function setStatus(state, msg) {
    document.getElementById('sDot').className = 'conn-dot ' + state;
    document.getElementById('sTxt').textContent = msg;
  }

  function connect() {
    try {
      if (pusher) { try { pusher.disconnect(); } catch(e){} }

      pusher = new Pusher(PUSHER_KEY, {
        cluster: PUSHER_CLUSTER,
        forceTLS: true,
        activityTimeout: 30000,
        pongTimeout: 15000,
      });

      pusher.connection.bind('connecting',    () => setStatus('connecting', '연결 중...'));
      pusher.connection.bind('connected',     () => {
        setStatus('connected', '실시간 연결됨');
        retryCount = 0;
        document.getElementById('reconnectOverlay').classList.remove('show');
        document.getElementById('offlineBar').classList.remove('show');
      });
      pusher.connection.bind('disconnected',  () => { setStatus('offline', '연결 끊김'); scheduleRetry(); });
      pusher.connection.bind('failed',        () => { setStatus('offline', '연결 실패'); scheduleRetry(); });
      pusher.connection.bind('unavailable',   () => { setStatus('offline', '서버 응답 없음'); scheduleRetry(); });

      const ch = pusher.subscribe('sermon');
      ch.bind('translation', data => showText(data.korean));

    } catch(e) {
      setStatus('offline', '연결 오류');
      scheduleRetry();
    }
  }

  function scheduleRetry() {
    if (retryCount >= 10) {
      setStatus('offline', '재연결 실패 — 새로고침 해주세요');
      document.getElementById('reconnectOverlay').classList.remove('show');
      return;
    }
    const delay = Math.min(2000 * Math.pow(1.5, retryCount), 30000);
    retryCount++;
    document.getElementById('reconnectOverlay').classList.add('show');
    document.getElementById('reconnectSub').textContent =
      `${retryCount}번째 시도 (${Math.round(delay/1000)}초 후)`;
    clearTimeout(retryTimer);
    retryTimer = setTimeout(connect, delay);
  }

  /* 네트워크 상태 감지 */
  window.addEventListener('online',  () => {
    document.getElementById('offlineBar').classList.remove('show');
    retryCount = 0; clearTimeout(retryTimer); connect();
  });
  window.addEventListener('offline', () => {
    document.getElementById('offlineBar').classList.add('show');
    setStatus('offline', '오프라인');
  });

  /* 화면 복귀 시 재연결 */
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      if (!pusher || pusher.connection.state !== 'connected') {
        retryCount = 0; clearTimeout(retryTimer); connect();
      }
    }
  });

  /* ── 번역 텍스트 표시 ── */
  function showText(korean, direction) {
    const el = document.getElementById('mainTxt');

    if (el.textContent) {
      prevTexts.unshift(el.textContent);
      if (prevTexts.length > 5) prevTexts.pop();
      document.getElementById('prevSec').style.display = 'block';
      document.getElementById('prevList').innerHTML =
        prevTexts.map(t => `<div class="prev-item">${t}</div>`).join('');
    }

    document.getElementById('waiting').style.display = 'none';
    el.classList.remove('hidden');
    el.textContent = korean;
    // 번역 방향 표시
    const badge = direction === 'ko-en' ? '🇰🇷 → 🇺🇸' : '🇺🇸 → 🇰🇷';
    document.getElementById('sTxt').textContent = '실시간 연결됨 · ' + badge;
    el.classList.remove('appear');
    void el.offsetWidth;
    el.classList.add('appear');

    localStorage.setItem('sermon-last', korean);
    localStorage.setItem('sermon-last-dir', direction || 'en-ko');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  connect();
</script>
</body>
</html>
