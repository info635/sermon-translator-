<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>✝ 설교 번역</title>
  <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    :root {
      --bg:   #07070e;
      --gold: #c9a84c;
      --text: #ede5d4;
      --dim:  #1a1a2a;
      --fs:   26px;
    }

    body {
      background:var(--bg);
      min-height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:60px 24px 48px;
      font-family:'Noto Serif KR','Malgun Gothic',serif;
      -webkit-text-size-adjust:100%;
    }

    /* 상단 금 라인 */
    .topline {
      position:fixed; top:0; left:0; right:0; height:3px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
    }

    /* ── 상태 바 ── */
    .statusbar {
      position:fixed; top:0; left:0; right:0;
      height:48px;
      display:flex; align-items:center; justify-content:center;
      gap:8px; z-index:10;
      padding-top:3px;
    }

    .s-pill {
      display:flex; align-items:center; gap:7px;
      padding:5px 16px; border-radius:20px;
      background:rgba(10,10,20,.85);
      border:1px solid #16162a;
      backdrop-filter:blur(8px);
      transition:all .4s;
    }
    .s-dot { width:7px; height:7px; border-radius:50%; background:#333; transition:all .4s; flex-shrink:0; }
    .s-dot.connected  { background:#4ade80; box-shadow:0 0 8px #4ade80; animation:pulse 2s infinite; }
    .s-dot.connecting { background:var(--gold); animation:pulse 1s infinite; }
    .s-dot.offline    { background:#f87171; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .s-txt { font-size:11px; color:#4a5070; letter-spacing:.1em; white-space:nowrap; }

    /* 오프라인 배너 */
    .offline-banner {
      position:fixed; top:48px; left:0; right:0;
      background:#3a0f0f; border-bottom:1px solid #6a2020;
      color:#fca5a5; font-size:13px;
      padding:8px; text-align:center;
      display:none; z-index:9;
      font-family:'Noto Sans KR',sans-serif;
    }
    .offline-banner.show { display:block; }

    /* 폰트 버튼 */
    .fbtns {
      position:fixed; top:10px; right:14px;
      display:flex; gap:5px; z-index:11;
    }
    .fbtn {
      background:rgba(255,255,255,.04); border:1px solid #14141f;
      color:#2a2a45; width:34px; height:34px; border-radius:7px;
      cursor:pointer; font-size:13px; font-weight:600;
      display:flex; align-items:center; justify-content:center;
      transition:all .2s; font-family:inherit; -webkit-tap-highlight-color:transparent;
    }
    .fbtn:active { background:rgba(255,255,255,.1); color:#8888aa; }

    /* ── 메인 콘텐츠 ── */
    .content { max-width:820px; width:100%; text-align:center; }

    /* 대기 화면 */
    .waiting { color:var(--dim); }
    .waiting-cross { font-size:52px; color:#12121e; margin-bottom:16px; }
    .waiting-msg   { font-size:16px; line-height:1.9; color:#1e1e30; }

    /* 번역 텍스트 */
    #mainTxt {
      font-size:var(--fs);
      line-height:2.1;
      color:var(--text);
      word-break:keep-all;
      letter-spacing:.02em;
      text-shadow:0 2px 40px rgba(201,168,76,.06);
      transition:font-size .2s;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .appear { animation:fadeUp .5s ease forwards; }

    /* 이전 내용 */
    .prev {
      margin-top:56px;
      border-top:1px solid #0e0e1a;
      padding-top:28px;
      max-width:820px; width:100%;
    }
    .prev-lbl {
      font-size:9px; color:#12121e;
      letter-spacing:.2em; text-transform:uppercase;
      text-align:center; margin-bottom:16px;
      font-family:'Noto Sans KR',sans-serif;
    }
    .prev-item {
      color:#18182a; font-size:15px; line-height:1.85;
      margin-bottom:16px; word-break:keep-all;
      transition:color .3s;
    }
    .prev-item:hover { color:#2e2e45; }

    /* 재연결 오버레이 */
    .reconnect-overlay {
      position:fixed; inset:0;
      background:rgba(7,7,14,.92);
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
      gap:16px; z-index:20;
      font-family:'Noto Sans KR',sans-serif;
    }
    .reconnect-overlay.show { display:flex; }
    .reconnect-spinner {
      width:48px; height:48px; border-radius:50%;
      border:3px solid #1a1a2a;
      border-top-color:var(--gold);
      animation:spin 1s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .reconnect-txt { color:#4a5070; font-size:14px; }
    .reconnect-count { color:var(--gold); font-size:13px; }

    /* 워터마크 */
    .wm {
      position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
      font-size:9px; color:#0e0e1a; letter-spacing:.2em;
      text-transform:uppercase; white-space:nowrap;
    }
  </style>
</head>
<body>

<div class="topline"></div>

<!-- 상태 바 -->
<div class="statusbar">
  <div class="s-pill">
    <div id="sDot" class="s-dot connecting"></div>
    <span id="sTxt" class="s-txt">연결 중...</span>
  </div>
</div>

<!-- 오프라인 배너 -->
<div id="offlineBanner" class="offline-banner">
  📶 인터넷 연결이 끊겼습니다 — 연결되면 자동으로 재접속됩니다
</div>

<!-- 폰트 크기 버튼 -->
<div class="fbtns">
  <button class="fbtn" onclick="fs(-2)">A−</button>
  <button class="fbtn" onclick="fs(+2)">A+</button>
</div>

<!-- 메인 텍스트 -->
<div class="content">
  <div id="waiting" class="waiting">
    <div class="waiting-cross">✝</div>
    <div class="waiting-msg">설교 번역을 기다리는 중입니다...</div>
  </div>
  <div id="mainTxt" style="display:none;"></div>
</div>

<!-- 이전 내용 -->
<div id="prevSec" class="prev" style="display:none;">
  <div class="prev-lbl">이전 내용</div>
  <div id="prevList"></div>
</div>

<!-- 재연결 오버레이 -->
<div id="reconnectOverlay" class="reconnect-overlay">
  <div class="reconnect-spinner"></div>
  <div class="reconnect-txt">연결이 끊겼습니다. 재연결 중...</div>
  <div id="reconnectCount" class="reconnect-count"></div>
</div>

<div class="wm">✝ Sermon Live Translation</div>

<script>
  /* ── 폰트 크기 ── */
  let fontSize = parseInt(localStorage.getItem('sermon-fs') || 26);
  document.documentElement.style.setProperty('--fs', fontSize + 'px');
  function fs(d) {
    fontSize = Math.max(14, Math.min(54, fontSize + d));
    document.documentElement.style.setProperty('--fs', fontSize + 'px');
    localStorage.setItem('sermon-fs', fontSize);
  }

  /* ── 마지막 번역 복원 (페이지 새로고침해도 유지) ── */
  const saved = localStorage.getItem('sermon-last');
  if (saved) {
    document.getElementById('waiting').style.display = 'none';
    document.getElementById('mainTxt').style.display = 'block';
    document.getElementById('mainTxt').textContent = saved;
  }

  /* ── Pusher 설정 ── */
  const PUSHER_KEY     = '9970878443f485296baf';      // ← 여기에 Pusher Key 입력
  const PUSHER_CLUSTER = 'mt1';  // ← 여기에 Pusher Cluster 입력

  const prevTexts = [];
  let pusher = null;
  let channel = null;
  let retryCount = 0;
  let retryTimer = null;
  const MAX_RETRY = 10;

  function setStatus(state, msg) {
    const dot = document.getElementById('sDot');
    const txt = document.getElementById('sTxt');
    dot.className = 's-dot ' + state;
    txt.textContent = msg;
  }

  /* ── Pusher 연결 ── */
  function connect() {
    try {
      if (pusher) { try { pusher.disconnect(); } catch(e){} }

      pusher = new Pusher(PUSHER_KEY, {
        cluster: PUSHER_CLUSTER,
        forceTLS: true,
        // 연결 타임아웃 설정
        activityTimeout: 30000,
        pongTimeout: 15000,
      });

      /* 연결 상태 이벤트 */
      pusher.connection.bind('connecting', () => {
        setStatus('connecting', '연결 중...');
      });

      pusher.connection.bind('connected', () => {
        setStatus('connected', '실시간 연결됨');
        retryCount = 0;
        document.getElementById('reconnectOverlay').classList.remove('show');
        document.getElementById('offlineBanner').classList.remove('show');
      });

      pusher.connection.bind('disconnected', () => {
        setStatus('offline', '연결 끊김 — 재연결 중...');
        scheduleRetry();
      });

      pusher.connection.bind('failed', () => {
        setStatus('offline', '연결 실패');
        scheduleRetry();
      });

      pusher.connection.bind('unavailable', () => {
        setStatus('offline', '서버 응답 없음');
        scheduleRetry();
      });

      /* 번역 수신 */
      channel = pusher.subscribe('sermon');
      channel.bind('translation', data => {
        showText(data.korean);
      });

    } catch(e) {
      setStatus('offline', '연결 오류');
      scheduleRetry();
    }
  }

  /* ── 자동 재연결 (지수 백오프) ── */
  function scheduleRetry() {
    if (retryCount >= MAX_RETRY) {
      setStatus('offline', '재연결 실패 — 새로고침 해주세요');
      document.getElementById('reconnectOverlay').classList.remove('show');
      return;
    }

    // 재연결 간격: 2초 → 4초 → 8초 → 최대 30초
    const delay = Math.min(2000 * Math.pow(1.5, retryCount), 30000);
    retryCount++;

    document.getElementById('reconnectOverlay').classList.add('show');
    document.getElementById('reconnectCount').textContent =
      `${retryCount}번째 시도 중... (${Math.round(delay/1000)}초 후)`;

    clearTimeout(retryTimer);
    retryTimer = setTimeout(() => {
      connect();
    }, delay);
  }

  /* ── 네트워크 상태 감지 (WiFi ↔ LTE 전환) ── */
  window.addEventListener('online', () => {
    document.getElementById('offlineBanner').classList.remove('show');
    // 네트워크 복구 시 즉시 재연결
    retryCount = 0;
    clearTimeout(retryTimer);
    connect();
  });

  window.addEventListener('offline', () => {
    document.getElementById('offlineBanner').classList.add('show');
    setStatus('offline', '오프라인 — 인터넷 연결 확인');
  });

  /* ── 페이지 다시 보일 때 재연결 (화면 잠금 해제 등) ── */
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      if (!pusher || pusher.connection.state !== 'connected') {
        retryCount = 0;
        clearTimeout(retryTimer);
        connect();
      }
    }
  });

  /* ── 번역 텍스트 표시 ── */
  function showText(korean) {
    const el = document.getElementById('mainTxt');

    // 현재 내용 → 이전 목록으로
    if (el.textContent) {
      prevTexts.unshift(el.textContent);
      if (prevTexts.length > 5) prevTexts.pop();
      document.getElementById('prevSec').style.display = 'block';
      document.getElementById('prevList').innerHTML =
        prevTexts.map(t => `<div class="prev-item">${t}</div>`).join('');
    }

    // 새 번역 표시 + 애니메이션
    document.getElementById('waiting').style.display = 'none';
    el.style.display = 'block';
    el.textContent = korean;
    el.classList.remove('appear');
    void el.offsetWidth;
    el.classList.add('appear');

    // 마지막 번역 저장 (새로고침해도 유지)
    localStorage.setItem('sermon-last', korean);

    // 화면 맨 위로 스크롤
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ── 시작 ── */
  connect();
</script>
</body>
</html>
