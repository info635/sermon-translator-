
<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#141413"/>
  <title>✝ 설교 번역</title>
  <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --fs: 20px; }

    [data-theme="dark"] {
      --bg:        #141413;
      --surface:   #1c1c1a;
      --border:    rgba(255,255,255,.09);
      --border2:   rgba(255,255,255,.04);
      --text:      #e8e6e0;
      --text2:     #787672;
      --text3:     #3a3a38;
      --accent:    #d97706;
      --accent-bg: rgba(217,119,6,.1);
      --accent-l:  rgba(217,119,6,.35);
      --cross:     #2a2a28;
      --overlay:   rgba(20,20,19,.97);
      --meta-bg:   #1c1c1a;
    }
    [data-theme="light"] {
      --bg:        #f9f9f8;
      --surface:   #ffffff;
      --border:    #e8e8e6;
      --border2:   #f2f2f0;
      --text:      #1a1a18;
      --text2:     #6b6b68;
      --text3:     #adadaa;
      --accent:    #d97706;
      --accent-bg: rgba(217,119,6,.06);
      --accent-l:  rgba(217,119,6,.3);
      --cross:     #e8e8e4;
      --overlay:   rgba(249,249,248,.97);
      --meta-bg:   #ffffff;
    }

    html { -webkit-text-size-adjust:100%; text-size-adjust:100%; }

    body {
      background:var(--bg); color:var(--text);
      font-family:'Noto Sans KR','DM Sans',sans-serif;
      min-height:100vh; min-height:100dvh;
      overflow-x:hidden; -webkit-font-smoothing:antialiased;
      transition:background .25s, color .25s;
    }

    /* TOP BAR */
    .topbar {
      position:fixed; top:0; left:0; right:0;
      top:env(safe-area-inset-top,0);
      height:54px;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 16px;
      background:var(--meta-bg);
      border-bottom:1px solid var(--border);
      z-index:100;
    }

    /* Logo in viewer */
    .vlogo { display:flex; align-items:center; gap:9px; }
    .vlogo img { width:30px; height:30px; border-radius:7px; object-fit:cover; }
    .vlogo-text { display:flex; flex-direction:column; gap:1px; }
    .vlogo-title { font-size:12px; font-weight:700; color:var(--text); letter-spacing:.06em; text-transform:uppercase; line-height:1; }
    .vlogo-sub { font-size:8px; color:var(--text3); letter-spacing:.06em; line-height:1; }

    .tb-right { display:flex; align-items:center; gap:8px; }

    /* UI lang toggle */
    .ui-lang { display:flex; background:var(--bg); border:1px solid var(--border); border-radius:7px; padding:2px; gap:2px; }
    .ui-lang-btn { padding:3px 9px; border-radius:5px; border:none; background:transparent; color:var(--text2); font-size:11px; font-weight:500; cursor:pointer; font-family:inherit; transition:all .15s; }
    .ui-lang-btn.on { background:var(--surface); color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.2); }

    #langBadge { font-size:12px; font-weight:500; color:var(--accent); padding:3px 8px; border-radius:6px; background:var(--accent-bg); }

    .conn-row { display:flex; align-items:center; gap:6px; }
    .conn-dot { width:6px; height:6px; border-radius:50%; background:var(--text3); flex-shrink:0; transition:background .3s; }
    .conn-dot.connected  { background:#22c55e; animation:dpulse 2.5s infinite; }
    .conn-dot.connecting { background:#d97706; animation:dpulse .9s infinite; }
    .conn-dot.offline    { background:#ef4444; }
    @keyframes dpulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .conn-txt { font-size:11px; color:var(--text3); font-weight:300; }

    .tb-btn { width:32px; height:32px; border-radius:7px; border:1px solid var(--border); background:transparent; color:var(--text2); font-size:15px; display:flex; align-items:center; justify-content:center; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:background .15s; }
    .tb-btn:active { background:var(--accent-bg); }

    /* OFFLINE BANNER */
    .offline-bar { position:fixed; top:calc(54px + env(safe-area-inset-top,0px)); left:0; right:0; background:#1c1600; border-bottom:1px solid #3d2e00; color:#fbbf24; font-size:12px; text-align:center; padding:7px 16px; font-family:inherit; display:none; z-index:99; }
    [data-theme="light"] .offline-bar { background:#fefce8; border-color:#fde68a; color:#92400e; }
    .offline-bar.show { display:block; }

    /* SCROLL */
    .scroll-area {
      padding-top:calc(54px + env(safe-area-inset-top,0px));
      padding-bottom:calc(68px + env(safe-area-inset-bottom,0px));
      min-height:100dvh;
    }

    /* WAITING */
    .waiting { min-height:65vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:40px 24px; }
    .cross-icon { font-size:34px; color:var(--cross); line-height:1; }
    .waiting-txt { font-size:15px; color:var(--text3); text-align:center; line-height:2.2; font-weight:300; }

    /* TRANSCRIPT */
    .transcript { padding:0; }

    .transcript-item {
      padding:20px 20px;
      border-bottom:1px solid var(--border2);
      font-size:var(--fs); line-height:2;
      word-break:break-word; overflow-wrap:break-word;
      transition:opacity .3s;
    }
    /* 최신: 왼쪽 강조선 */
    .transcript-item.latest {
      background:var(--accent-bg);
      border-left:2px solid var(--accent-l);
      padding-left:18px;
    }
    /* 이전: 흐림 없음 */
    .transcript-item:not(.latest) { opacity:1; }

    .item-time { font-size:10px; color:var(--text3); font-weight:300; margin-bottom:8px; letter-spacing:.04em; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .appear { animation:fadeUp .3s ease both; }

    /* BOTTOM BAR */
    .bottom-bar {
      position:fixed; bottom:0; left:0; right:0;
      height:calc(52px + env(safe-area-inset-bottom,0px));
      padding:0 18px; padding-bottom:env(safe-area-inset-bottom,0px);
      background:var(--meta-bg); border-top:1px solid var(--border);
      display:flex; align-items:center; gap:10px; z-index:100;
    }
    .fs-wrap { display:flex; align-items:center; gap:1px; background:var(--bg); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    .fs-btn { width:38px; height:36px; border:none; background:transparent; color:var(--text2); font-size:13px; font-weight:500; display:flex; align-items:center; justify-content:center; cursor:pointer; font-family:inherit; -webkit-tap-highlight-color:transparent; transition:background .15s; }
    .fs-btn:active { background:var(--accent-bg); color:var(--accent); }
    .fs-div { width:1px; height:20px; background:var(--border); flex-shrink:0; }
    .fs-val { font-size:11px; color:var(--text3); min-width:28px; text-align:center; padding:0 4px; }
    .bb-r { margin-left:auto; }
    .bb-btn { width:34px; height:34px; border-radius:7px; border:1px solid var(--border); background:transparent; color:var(--text2); font-size:15px; display:flex; align-items:center; justify-content:center; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:background .15s; }
    .bb-btn:active { background:var(--accent-bg); }

    /* NEW BADGE */
    .new-badge {
      position:fixed; bottom:calc(60px + env(safe-area-inset-bottom,0px));
      left:50%; transform:translateX(-50%) translateY(10px);
      background:var(--accent); color:#fff; font-size:12px; font-weight:500;
      padding:7px 16px; border-radius:20px; cursor:pointer;
      opacity:0; transition:opacity .2s, transform .2s;
      pointer-events:none; z-index:101; white-space:nowrap;
      box-shadow:0 4px 12px rgba(0,0,0,.3);
      -webkit-tap-highlight-color:transparent;
    }
    .new-badge.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }

    /* CLEAR MODAL */
    .cm-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; z-index:400; padding:24px 24px calc(90px + env(safe-area-inset-bottom,0px)); }
    .cm-bg.show { display:flex; }
    .cm { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:28px 22px 20px; width:100%; max-width:290px; text-align:center; box-shadow:0 16px 40px rgba(0,0,0,.4); }
    .cm-icon { font-size:28px; margin-bottom:12px; }
    .cm-title { font-size:15px; font-weight:500; color:var(--text); margin-bottom:8px; }
    .cm-desc { font-size:13px; color:var(--text2); line-height:1.7; margin-bottom:20px; font-weight:300; }
    .cm-btns { display:flex; gap:8px; }
    .cm-cancel { flex:1; padding:11px; border-radius:10px; border:1px solid var(--border); background:transparent; color:var(--text2); font-size:13px; font-family:inherit; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .cm-ok { flex:1; padding:11px; border-radius:10px; border:none; background:var(--accent); color:#fff; font-size:13px; font-weight:500; font-family:inherit; cursor:pointer; -webkit-tap-highlight-color:transparent; }

    /* RECONNECT */
    .rc-overlay { position:fixed; inset:0; background:var(--overlay); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:200; }
    .rc-overlay.show { display:flex; }
    .spinner { width:32px; height:32px; border-radius:50%; border:2px solid var(--border2); border-top-color:var(--accent); animation:spin 1s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .rc-msg { font-size:14px; color:var(--text2); font-weight:300; }
    .rc-sub { font-size:12px; color:var(--accent); }

    ::-webkit-scrollbar { width:0; }
  </style>
</head>

      <span class="vlogo-title">WORSHIPONAIR</span>

  </div>
  <div class="tb-right">
    <div class="conn-row">
      <div id="sDot" class="conn-dot connecting"></div>
      <span id="sTxt" class="conn-txt">...</span>
    </div>
    <div id="langBadge"></div>
    <div class="ui-lang">
      <button class="ui-lang-btn on" id="ui-ko" onclick="setUILang('ko')">한국어</button>
      <button class="ui-lang-btn"   id="ui-en" onclick="setUILang('en')">EN</button>

    <button class="tb-btn" onclick="toggleTheme()"><span id="themeIcon">☀️</span></button>

<div id="offlineBar" class="offline-bar" data-ko="인터넷 연결이 끊겼습니다 — 자동으로 재연결합니다" data-en="Internet disconnected — reconnecting automatically">인터넷 연결이 끊겼습니다 — 자동으로 재연결합니다</div>

<div class="scroll-area">
  <div id="waiting" class="waiting">
    <div class="cross-icon">✝</div>
    <div id="waitingTxt" class="waiting-txt"></div>
  </div>
  <div id="transcript" class="transcript" style="display:none;"></div>
</div>

<div class="bottom-bar">
  <div class="fs-wrap">
    <button class="fs-btn" onclick="changeFontSize(-2)">A−</button>
    <div class="fs-div"></div>
    <span class="fs-val" id="fsDisplay">20</span>
    <div class="fs-div"></div>
    <button class="fs-btn" onclick="changeFontSize(+2)">A+</button>
  </div>
  <div class="bb-r">
    <button class="bb-btn" onclick="showClearModal()">🗑️</button>
  </div>
</div>

<div id="newBadge" class="new-badge" onclick="scrollToLatest()"></div>

<div class="cm-bg" id="cmBg" onclick="hideClearModal(event)">
  <div class="cm">
    <div class="cm-icon">🗑️</div>
    <div class="cm-title" id="cmTitle"></div>
    <div class="cm-desc" id="cmDesc"></div>
    <div class="cm-btns">
      <button class="cm-cancel" id="cmCancel" onclick="hideClearModal()">취소</button>
      <button class="cm-ok"     id="cmOk"     onclick="clearTranscript()">삭제</button>
    </div>
  </div>
</div>

<div id="rcOverlay" class="rc-overlay">
  <div class="spinner"></div>
  <div class="rc-msg" id="rcMsg"></div>
  <div id="rcSub" class="rc-sub"></div>
</div>

<script>
  /* ── Pusher 키 설정 ── */
  const PUSHER_KEY     = '9970878443f485296baf';
  const PUSHER_CLUSTER = 'mt1';


  const LANG_INFO = {
    ko:{flag:'🇰🇷',name:'한국어',nameEn:'Korean'},
    en:{flag:'🇺🇸',name:'English',nameEn:'English'},
    tl:{flag:'🇵🇭',name:'Tagalog',nameEn:'Tagalog'},
    es:{flag:'🇪🇸',name:'Español',nameEn:'Spanish'},
    zh:{flag:'🇨🇳',name:'中文',nameEn:'Chinese'},
  };
  const params      = new URLSearchParams(location.search);
  const currentLang = params.get('lang') || 'ko';
  const langInfo    = LANG_INFO[currentLang] || LANG_INFO.ko;

  document.title = langInfo.flag + ' ' + langInfo.name;

  // ── UI 언어 ──
  let uiLang = localStorage.getItem('viewer-ui-lang') || 'ko';

  const T = {
    connecting:  {ko:'연결 중...',      en:'Connecting...'},
    connected:   {ko:'실시간 연결',     en:'Live'},
    disconnected:{ko:'연결 끊김',       en:'Disconnected'},
    failed:      {ko:'연결 실패',       en:'Failed'},
    unavailable: {ko:'서버 없음',       en:'Unavailable'},
    offline:     {ko:'오프라인',        en:'Offline'},
    retryFail:   {ko:'새로고침 해주세요',en:'Please refresh'},
    waiting:     {ko:'번역을\n기다리는 중입니다...', en:'Waiting for\ntranslation...'},
    newBadge:    {ko:'↓ 새 번역',       en:'↓ New translation'},
    connLost:    {ko:'연결이 끊겼습니다',en:'Connection lost'},
    retrying:    {ko:'번째 시도 (',      en:'th attempt ('},
    sec:         {ko:'초 후)',           en:'s)'},
    offlineBan:  {ko:'인터넷 연결이 끊겼습니다 — 자동으로 재연결합니다', en:'Internet disconnected — reconnecting automatically'},
    clearTitle:  {ko:'번역 내용을 지우시겠습니까?', en:'Clear all translations?'},
    clearDesc:   {ko:'지금까지 번역된 모든 내용이\n삭제됩니다. 되돌릴 수 없습니다.', en:'All translated content will be\ndeleted. This cannot be undone.'},
    cancel:      {ko:'취소',            en:'Cancel'},
    delete:      {ko:'삭제',            en:'Delete'},
  };

  function t(key) { return T[key]?.[uiLang] || T[key]?.ko || key; }

  function setUILang(lang) {
    uiLang = lang;
    localStorage.setItem('viewer-ui-lang', lang);
    document.getElementById('ui-ko').classList.toggle('on', lang==='ko');
    document.getElementById('ui-en').classList.toggle('on', lang==='en');
    applyUILang();
  }

  function applyUILang() {
    document.getElementById('waitingTxt').innerHTML = t('waiting').replace('\n','<br>');
    document.getElementById('newBadge').textContent = t('newBadge');
    document.getElementById('cmTitle').textContent  = t('clearTitle');
    document.getElementById('cmDesc').textContent   = t('clearDesc');
    document.getElementById('cmCancel').textContent = t('cancel');
    document.getElementById('cmOk').textContent     = t('delete');
    document.getElementById('rcMsg').textContent    = t('connLost');
    document.getElementById('offlineBar').textContent = t('offlineBan');
    const badge = document.getElementById('langBadge');
    badge.textContent = langInfo.flag + ' ' + (uiLang==='ko' ? langInfo.name : langInfo.nameEn);
  }

  // ── 테마 (기본: 다크) ──
  const savedTheme = localStorage.getItem('sermon-theme') || 'dark';
  applyTheme(savedTheme);
  function applyTheme(th) {
    document.documentElement.setAttribute('data-theme', th);
    document.getElementById('themeIcon').textContent = th==='dark' ? '☀️' : '🌙';
    document.querySelector('meta[name="theme-color"]').content = th==='dark' ? '#141413' : '#f9f9f8';
    localStorage.setItem('sermon-theme', th);
  }
  function toggleTheme() { applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); }

  // ── 글자 크기 ──
  let fontSize = parseInt(localStorage.getItem('sermon-fs')||20);
  applyFS();
  function changeFontSize(d){fontSize=Math.max(14,Math.min(54,fontSize+d));applyFS();localStorage.setItem('sermon-fs',fontSize);}
  function applyFS(){document.documentElement.style.setProperty('--fs',fontSize+'px');document.getElementById('fsDisplay').textContent=fontSize;}

  // ── 이전 내용 복원 ──
  const saved2=JSON.parse(localStorage.getItem('sermon-transcript')||'[]');
  if(saved2.length>0){
    document.getElementById('waiting').style.display='none';
    document.getElementById('transcript').style.display='block';
    saved2.forEach((item,i)=>appendItem(item,false,i===saved2.length-1));
    setTimeout(()=>window.scrollTo({top:document.body.scrollHeight,behavior:'instant'}),50);
  }

  let allTexts=saved2.slice(),pusher=null,retryCount=0,retryTimer=null;

  function setStatus(s,msg){
    document.getElementById('sDot').className='conn-dot '+s;
    document.getElementById('sTxt').textContent=msg;
  }

  function connect(){
    try{
      if(pusher){try{pusher.disconnect();}catch(e){}}
      pusher=new Pusher(PUSHER_KEY,{cluster:PUSHER_CLUSTER,forceTLS:true,activityTimeout:30000,pongTimeout:15000});
      pusher.connection.bind('connecting', ()=>setStatus('connecting',t('connecting')));
      pusher.connection.bind('connected',  ()=>{
        setStatus('connected',t('connected'));
        retryCount=0;
        document.getElementById('rcOverlay').classList.remove('show');
        document.getElementById('offlineBar').classList.remove('show');
      });
      pusher.connection.bind('disconnected',()=>{setStatus('offline',t('disconnected'));scheduleRetry();});
      pusher.connection.bind('failed',      ()=>{setStatus('offline',t('failed'));scheduleRetry();});
      pusher.connection.bind('unavailable', ()=>{setStatus('offline',t('unavailable'));scheduleRetry();});
      const ch=pusher.subscribe('sermon-'+currentLang);
      ch.bind('translation',data=>showText(data.translated));
    }catch(e){setStatus('offline','Error');scheduleRetry();}
  }

  function scheduleRetry(){
    if(retryCount>=10){setStatus('offline',t('retryFail'));document.getElementById('rcOverlay').classList.remove('show');return;}
    const delay=Math.min(2000*Math.pow(1.5,retryCount),30000);
    retryCount++;
    document.getElementById('rcOverlay').classList.add('show');
    document.getElementById('rcMsg').textContent=t('connLost');
    document.getElementById('rcSub').textContent=retryCount+t('retrying')+Math.round(delay/1000)+t('sec');
    clearTimeout(retryTimer);
    retryTimer=setTimeout(connect,delay);
  }

  window.addEventListener('online', ()=>{document.getElementById('offlineBar').classList.remove('show');retryCount=0;clearTimeout(retryTimer);connect();});
  window.addEventListener('offline',()=>{document.getElementById('offlineBar').classList.add('show');setStatus('offline',t('offline'));});
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='visible'&&(!pusher||pusher.connection.state!=='connected')){retryCount=0;clearTimeout(retryTimer);connect();}
  });

  function appendItem(text,animate,isLatest){
    const w=document.createElement('div');
    w.className='transcript-item'+(isLatest?' latest':'')+(animate?' appear':'');
    if(animate){const ts=document.createElement('div');ts.className='item-time';ts.textContent=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});w.appendChild(ts);}
    const txt=document.createElement('div');txt.textContent=text;w.appendChild(txt);
    document.getElementById('transcript').appendChild(w);
    return w;
  }

  function showText(text){
    document.getElementById('waiting').style.display='none';
    const tr=document.getElementById('transcript');
    tr.style.display='block';
    const scrollY=window.scrollY;
    const scrollEl=document.scrollingElement||document.documentElement;
    const prev=tr.querySelector('.latest');
    if(prev){prev.classList.remove('latest');prev.style.borderLeft='';prev.style.paddingLeft='';}
    appendItem(text,false,true);
    scrollEl.scrollTop=scrollY;
    window.scrollTo({top:scrollY,behavior:'instant'});
    requestAnimationFrame(()=>{
      window.scrollTo({top:scrollY,behavior:'instant'});
      requestAnimationFrame(()=>window.scrollTo({top:scrollY,behavior:'instant'}));
    });
    setStatus('connected',t('connected'));
    allTexts.push(text);
    if(allTexts.length>50)allTexts.shift();
    localStorage.setItem('sermon-transcript',JSON.stringify(allTexts));
    const b=document.getElementById('newBadge');
    b.classList.remove('show');void b.offsetWidth;b.classList.add('show');
    clearTimeout(b._t);b._t=setTimeout(()=>b.classList.remove('show'),5000);
  }

  window.addEventListener('scroll',()=>{
    const d=document.body.scrollHeight-window.scrollY-window.innerHeight;
    if(d<=150)document.getElementById('newBadge').classList.remove('show');
  },{passive:true});

  function scrollToLatest(){
    const l=document.querySelector('.transcript-item.latest');
    if(l)l.scrollIntoView({behavior:'smooth',block:'start'});
    document.getElementById('newBadge').classList.remove('show');
  }

  function showClearModal(){document.getElementById('cmBg').classList.add('show');}
  function hideClearModal(e){if(!e||e.target===document.getElementById('cmBg'))document.getElementById('cmBg').classList.remove('show');}
  function clearTranscript(){
    const tr=document.getElementById('transcript');
    tr.innerHTML='';tr.style.display='none';
    document.getElementById('waiting').style.display='flex';
    allTexts=[];localStorage.removeItem('sermon-transcript');
    document.getElementById('cmBg').classList.remove('show');
  }

  // 초기화
  setUILang(uiLang);
  connect();
</script>
