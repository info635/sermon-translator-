
<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="theme-color" content="#ffffff"/>
  <title>✝ 설교 번역</title>
  <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=Noto+Serif+KR:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── CSS 변수 ── */
    :root { --fs: 20px; }

    /* 라이트 모드 (기본) */
    [data-theme="light"] {
      --bg:           #ffffff;
      --bg-top:       rgba(255,255,255,.95);
      --bg-bot:       rgba(255,255,255,.95);
      --border:       #e8e2d9;
      --border-light: #f0ebe3;
      --accent:       #7a5520;
      --accent-dim:   rgba(122,85,32,.08);
      --text:         #1c1510;
      --text-dim:     #9a8e80;
      --text-faint:   #c8bfb5;
      --dot-on:       #22c55e;
      --dot-wait:     #f59e0b;
      --offline-bg:   #fff1f1;
      --offline-bd:   #fecaca;
      --offline-tx:   #dc2626;
      --overlay:      rgba(255,255,255,.96);
      --cross:        #e8e0d5;
    }

    /* 다크 모드 */
    [data-theme="dark"] {
      --bg:           #0f0f14;
      --bg-top:       rgba(15,15,20,.95);
      --bg-bot:       rgba(15,15,20,.95);
      --border:       rgba(255,255,255,.08);
      --border-light: rgba(255,255,255,.04);
      --accent:       #c9a84c;
      --accent-dim:   rgba(201,168,76,.1);
      --text:         #ede5d4;
      --text-dim:     #5a6070;
      --text-faint:   #2a2a3a;
      --dot-on:       #4ade80;
      --dot-wait:     #c9a84c;
      --offline-bg:   #3a0f0f;
      --offline-bd:   #7a2020;
      --offline-tx:   #fca5a5;
      --overlay:      rgba(10,10,16,.97);
      --cross:        #1a1a24;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif KR', Georgia, serif;
      transition: background .3s, color .3s;
      overflow-x: hidden;
    }

    /* ═══════════════════════════
       상단 바
    ═══════════════════════════ */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      top: env(safe-area-inset-top, 0);
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--bg-top);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    /* 연결 상태 칩 */
    .conn-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 11px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--accent-dim);
    }
    .conn-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-faint);
      flex-shrink: 0;
      transition: background .4s;
    }
    .conn-dot.connected  {
      background: var(--dot-on);
      box-shadow: 0 0 0 3px rgba(34,197,94,.15);
      animation: pulse 2.5s infinite;
    }
    .conn-dot.connecting { background: var(--dot-wait); animation: pulse .9s infinite; }
    .conn-dot.offline    { background: #ef4444; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    .conn-txt {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: .06em;
      font-family: 'Noto Sans KR', sans-serif;
      white-space: nowrap;
    }

    /* 오른쪽 버튼들 */
    .topbar-right { display: flex; align-items: center; gap: 6px; }

    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .2s;
    }
    .icon-btn:active { background: var(--accent-dim); }

    /* ═══════════════════════════
       오프라인 배너
    ═══════════════════════════ */
    .offline-bar {
      position: fixed;
      top: calc(52px + env(safe-area-inset-top, 0px));
      left: 0; right: 0;
      padding: 8px 16px;
      background: var(--offline-bg);
      border-bottom: 1px solid var(--offline-bd);
      color: var(--offline-tx);
      font-size: 12px;
      text-align: center;
      font-family: 'Noto Sans KR', sans-serif;
      display: none; z-index: 99;
    }
    .offline-bar.show { display: block; }

    /* ═══════════════════════════
       스크롤 영역
    ═══════════════════════════ */
    .scroll-area {
      padding-top: calc(52px + env(safe-area-inset-top, 0px));
      padding-bottom: calc(68px + env(safe-area-inset-bottom, 0px));
      min-height: 100dvh;
      -webkit-overflow-scrolling: touch;
    }

    /* ═══════════════════════════
       대기 화면
    ═══════════════════════════ */
    .waiting {
      min-height: 60vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; padding: 40px 24px;
    }
    .cross-icon {
      font-size: 52px;
      color: var(--cross);
      line-height: 1;
    }
    .waiting-txt {
      font-size: 15px;
      color: var(--text-dim);
      line-height: 1.9;
      text-align: center;
      font-family: 'Noto Sans KR', sans-serif;
    }

    /* ═══════════════════════════
       번역 스크립트
    ═══════════════════════════ */
    .transcript {
      padding: 0;
    }

    .transcript-item {
      padding: 20px 20px 20px 20px;
      border-bottom: 1px solid var(--border-light);
      font-size: var(--fs);
      line-height: 1.95;
      word-break: keep-all;
      text-align: left;
      letter-spacing: -.01em;
      transition: opacity .4s;
    }

    /* 최신 항목 — 완전히 선명 */
    .transcript-item.latest {
      opacity: 1;
      color: var(--text);
      background: var(--accent-dim);
      border-left: 3px solid var(--accent);
      padding-left: 17px;
    }

    /* 이전 항목 — 흐리게 */
    .transcript-item:not(.latest) {
      opacity: .8;
      color: var(--text);
    }

    /* 새 항목 등장 애니메이션 */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }
    .appear { animation: slideIn .4s cubic-bezier(.2,.8,.4,1) both; }

    /* 타임스탬프 */
    .item-time {
      font-size: 10px;
      color: var(--text-faint);
      font-family: 'Noto Sans KR', sans-serif;
      margin-bottom: 6px;
      letter-spacing: .04em;
    }

    /* ═══════════════════════════
       하단 바 (글자 크기 + 테마)
    ═══════════════════════════ */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 10px 20px;
      padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
      background: var(--bg-bot);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      z-index: 100;
    }

    .fs-group {
      display: flex; align-items: center; gap: 8px;
    }

    .fs-btn {
      width: 42px; height: 42px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 15px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      -webkit-tap-highlight-color: transparent;
      transition: all .15s;
    }
    .fs-btn:active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

    .fs-display {
      font-size: 12px;
      color: var(--text-faint);
      font-family: 'Noto Sans KR', sans-serif;
      min-width: 36px;
      text-align: center;
    }

    .theme-toggle {
      width: 42px; height: 42px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .theme-toggle:active { background: var(--accent-dim); }

    /* ═══════════════════════════
       재연결 오버레이
    ═══════════════════════════ */
    .reconnect-overlay {
      position: fixed; inset: 0;
      background: var(--overlay);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 200;
    }
    .reconnect-overlay.show { display: flex; }
    .spinner {
      width: 44px; height: 44px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .reconnect-msg { font-size: 15px; color: var(--text-dim); font-family: 'Noto Sans KR', sans-serif; }
    .reconnect-sub { font-size: 12px; color: var(--accent); font-family: 'Noto Sans KR', sans-serif; }

    /* ═══════════════════════════
       스크롤바
    ═══════════════════════════ */
    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- 상단 바 -->
<div class="topbar">
  <div class="conn-chip">
    <div id="sDot" class="conn-dot connecting"></div>
    <span id="sTxt" class="conn-txt">연결 중...</span>
  </div>
  <div class="topbar-right">
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="테마 변경">
      <span id="themeIcon">🌙</span>
    </button>
  </div>
</div>

<!-- 오프라인 배너 -->
<div id="offlineBar" class="offline-bar">
  📶 인터넷 연결이 끊겼습니다 — 자동으로 재연결합니다
</div>

<!-- 스크롤 영역 -->
<div class="scroll-area">

  <!-- 대기 화면 -->
  <div id="waiting" class="waiting">
    <div class="cross-icon">✝</div>
    <div class="waiting-txt">설교 번역을<br>기다리는 중입니다...</div>
  </div>

  <!-- 번역 스크립트 -->
  <div id="transcript" class="transcript" style="display:none;"></div>

</div>

<!-- 하단 바 -->
<div class="bottom-bar">
  <div class="fs-group">
    <button class="fs-btn" onclick="changeFontSize(-2)" aria-label="글자 작게">A−</button>
    <span class="fs-display" id="fsDisplay">20px</span>
    <button class="fs-btn" onclick="changeFontSize(+2)" aria-label="글자 크게">A+</button>
  </div>
  <span style="font-size:11px;color:var(--text-faint);font-family:'Noto Sans KR',sans-serif;">글자 크기</span>
</div>

<!-- 새 번역 알림 배너 -->
<div id="newBadge" class="new-badge" onclick="scrollToLatest()">
  ↓ 새 번역이 추가됐습니다
</div>

<!-- 재연결 오버레이 -->
<div id="reconnectOverlay" class="reconnect-overlay">
  <div class="spinner"></div>
  <div class="reconnect-msg">연결이 끊겼습니다</div>
  <div id="reconnectSub" class="reconnect-sub">재연결 중...</div>
</div>

<script>
  /* ── Pusher 키 설정 ── */
  const PUSHER_KEY     = '9970878443f485296baf';
  const PUSHER_CLUSTER = 'mt1';

  /* ── 테마 (기본: 라이트) ── */
  const savedTheme = localStorage.getItem('sermon-theme') || 'light';
  applyTheme(savedTheme);

  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('themeIcon').textContent = t === 'dark' ? '☀️' : '🌙';
    document.querySelector('meta[name="theme-color"]').content = t === 'dark' ? '#0f0f14' : '#ffffff';
    localStorage.setItem('sermon-theme', t);
  }
  function toggleTheme() {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  }

  /* ── 글자 크기 ── */
  let fontSize = parseInt(localStorage.getItem('sermon-fs') || 20);
  applyFontSize();

  function changeFontSize(d) {
    fontSize = Math.max(14, Math.min(54, fontSize + d));
    applyFontSize();
    localStorage.setItem('sermon-fs', fontSize);
  }
  function applyFontSize() {
    document.documentElement.style.setProperty('--fs', fontSize + 'px');
    document.getElementById('fsDisplay').textContent = fontSize + 'px';
  }

  /* ── 이전 내용 복원 ── */
  const savedItems = JSON.parse(localStorage.getItem('sermon-transcript') || '[]');
  if (savedItems.length > 0) {
    document.getElementById('waiting').style.display = 'none';
    document.getElementById('transcript').style.display = 'block';
    savedItems.forEach((item, i) => {
      appendItem(item, false, i === savedItems.length - 1);
    });
    setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'instant' }), 50);
  }

  let allTexts = savedItems.slice();
  let pusher = null;
  let retryCount = 0;
  let retryTimer = null;

  /* ── 상태 표시 ── */
  function setStatus(state, msg) {
    document.getElementById('sDot').className = 'conn-dot ' + state;
    document.getElementById('sTxt').textContent = msg;
  }

  /* ── Pusher 연결 ── */
  function connect() {
    try {
      if (pusher) { try { pusher.disconnect(); } catch(e){} }
      pusher = new Pusher(PUSHER_KEY, {
        cluster: PUSHER_CLUSTER,
        forceTLS: true,
        activityTimeout: 30000,
        pongTimeout: 15000,
      });
      pusher.connection.bind('connecting',  () => setStatus('connecting', '연결 중...'));
      pusher.connection.bind('connected',   () => {
        setStatus('connected', '실시간 연결됨');
        retryCount = 0;
        document.getElementById('reconnectOverlay').classList.remove('show');
        document.getElementById('offlineBar').classList.remove('show');
      });
      pusher.connection.bind('disconnected', () => { setStatus('offline', '연결 끊김'); scheduleRetry(); });
      pusher.connection.bind('failed',       () => { setStatus('offline', '연결 실패'); scheduleRetry(); });
      pusher.connection.bind('unavailable',  () => { setStatus('offline', '서버 없음'); scheduleRetry(); });

      const ch = pusher.subscribe('sermon');
      ch.bind('translation', data => showText(data.translated || data.korean, data.direction));
    } catch(e) {
      setStatus('offline', '연결 오류');
      scheduleRetry();
    }
  }

  function scheduleRetry() {
    if (retryCount >= 10) {
      setStatus('offline', '재연결 실패 — 새로고침 해주세요');
      document.getElementById('reconnectOverlay').classList.remove('show');
      return;
    }
    const delay = Math.min(2000 * Math.pow(1.5, retryCount), 30000);
    retryCount++;
    document.getElementById('reconnectOverlay').classList.add('show');
    document.getElementById('reconnectSub').textContent =
      `${retryCount}번째 시도 (${Math.round(delay/1000)}초 후)`;
    clearTimeout(retryTimer);
    retryTimer = setTimeout(connect, delay);
  }

  window.addEventListener('online',  () => {
    document.getElementById('offlineBar').classList.remove('show');
    retryCount = 0; clearTimeout(retryTimer); connect();
  });
  window.addEventListener('offline', () => {
    document.getElementById('offlineBar').classList.add('show');
    setStatus('offline', '오프라인');
  });
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' &&
        (!pusher || pusher.connection.state !== 'connected')) {
      retryCount = 0; clearTimeout(retryTimer); connect();
    }
  });

  /* ── 번역 항목 추가 ── */
  function appendItem(text, animate, isLatest) {
    const wrap = document.createElement('div');
    wrap.className = 'transcript-item' + (isLatest ? ' latest' : '') + (animate ? ' appear' : '');

    // 타임스탬프
    if (animate) {
      const ts = document.createElement('div');
      ts.className = 'item-time';
      ts.textContent = new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
      wrap.appendChild(ts);
    }

    const txt = document.createElement('div');
    txt.textContent = text;
    wrap.appendChild(txt);

    document.getElementById('transcript').appendChild(wrap);
    return wrap;
  }

  /* ── 번역 텍스트 표시 ── */
  function showText(text, direction) {
    document.getElementById('waiting').style.display = 'none';
    const transcript = document.getElementById('transcript');
    transcript.style.display = 'block';

    // 현재 스크롤 위치 저장 (모바일에서 DOM 추가 시 밀리는 현상 방지)
    const scrollY = window.scrollY;
    const scrollEl = document.scrollingElement || document.documentElement;

    // 기존 latest 제거
    const prevLatest = transcript.querySelector('.latest');
    if (prevLatest) {
      prevLatest.classList.remove('latest');
      prevLatest.style.borderLeft = '';
      prevLatest.style.paddingLeft = '';
    }

    // 새 항목 추가
    const div = appendItem(text, false, true); // 애니메이션 없이 추가 (스크롤 방지)

    // 스크롤 위치 즉시 복원 (브라우저가 움직이기 전에)
    scrollEl.scrollTop = scrollY;
    window.scrollTo({ top: scrollY, behavior: 'instant' });

    // rAF 두 번으로 브라우저 렌더 후에도 위치 고정
    requestAnimationFrame(() => {
      window.scrollTo({ top: scrollY, behavior: 'instant' });
      requestAnimationFrame(() => {
        window.scrollTo({ top: scrollY, behavior: 'instant' });
      });
    });

    // 상태 업데이트
    const badge = direction === 'ko-en' ? '🇰🇷→🇺🇸' : '🇺🇸→🇰🇷';
    setStatus('connected', `실시간 연결됨 · ${badge}`);

    // 저장
    allTexts.push(text);
    if (allTexts.length > 50) allTexts.shift();
    localStorage.setItem('sermon-transcript', JSON.stringify(allTexts));

    // 항상 배너 표시 (사용자가 탭해서 새 번역으로 이동)
    const badgeEl = document.getElementById('newBadge');
    badgeEl.classList.remove('show');
    void badgeEl.offsetWidth;
    badgeEl.classList.add('show');

    // 5초 후 배너 자동 숨김
    clearTimeout(badgeEl._timer);
    badgeEl._timer = setTimeout(() => badgeEl.classList.remove('show'), 5000);
  }


  /* ── 새 번역 알림 배너 ── */
  let userIsReading = false;  // 사용자가 위에서 읽는 중인지

  // 스크롤 위치 감지 — 하단에서 150px 이상 위면 "읽는 중"
  window.addEventListener('scroll', () => {
    const distFromBottom = document.body.scrollHeight - window.scrollY - window.innerHeight;
    userIsReading = distFromBottom > 150;
    if (!userIsReading) {
      document.getElementById('newBadge').classList.remove('show');
    }
  }, { passive: true });

  function scrollToLatest() {
    const latest = document.querySelector('.transcript-item.latest');
    if (latest) latest.scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.getElementById('newBadge').classList.remove('show');
  }

  connect();
</script>
</body>
</html>
