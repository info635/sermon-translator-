<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✝ 설교 번역</title>
  <!-- Pusher 클라이언트 (CDN — 설치 불필요) -->
  <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    :root {
      --bg:   #07070e;
      --gold: #c9a84c;
      --text: #ede5d4;
      --dim:  #252535;
      --fs:   26px;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 56px 24px 40px;
      font-family: 'Noto Serif KR', 'Malgun Gothic', serif;
    }

    /* 상단 금 라인 */
    .topline {
      position:fixed; top:0; left:0; right:0; height:3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* 연결 상태 */
    .status {
      position:fixed; top:14px; left:50%; transform:translateX(-50%);
      display:flex; align-items:center; gap:7px;
      background:rgba(255,255,255,.04);
      border:1px solid #14141f;
      border-radius:20px; padding:5px 14px;
    }
    .s-dot { width:7px; height:7px; border-radius:50%; background:#333; transition:all .3s; }
    .s-dot.live    { background:var(--gold); box-shadow:0 0 8px var(--gold); animation:pulse 2s infinite; }
    .s-dot.ok      { background:#4ade80; box-shadow:0 0 8px #4ade80; animation:pulse 2s infinite; }
    .s-dot.err     { background:#f87171; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .s-txt { font-size:11px; color:#3a3a5a; letter-spacing:.1em; }

    /* 폰트 크기 버튼 */
    .fbtns { position:fixed; top:10px; right:14px; display:flex; gap:5px; }
    .fbtn {
      background:rgba(255,255,255,.04); border:1px solid #14141f;
      color:#2a2a45; width:32px; height:32px; border-radius:6px;
      cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center;
      transition:all .2s; font-family:inherit;
    }
    .fbtn:hover { color:#6a6a9a; border-color:#252535; }

    /* 메인 콘텐츠 */
    .content { max-width:820px; width:100%; text-align:center; }

    /* 대기 화면 */
    .waiting { color:var(--dim); }
    .waiting-cross { font-size:52px; color:#14141f; margin-bottom:14px; }
    .waiting-msg   { font-size:16px; line-height:1.8; }

    /* 번역 텍스트 */
    #mainTxt {
      font-size: var(--fs);
      line-height: 2.05;
      color: var(--text);
      word-break: keep-all;
      letter-spacing: .02em;
      transition: font-size .2s;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .appear { animation: fadeUp .45s ease forwards; }

    /* 이전 내용 */
    .prev {
      margin-top:52px;
      border-top:1px solid #101018;
      padding-top:24px;
      max-width:820px; width:100%;
    }
    .prev-lbl { font-size:9px; color:#14141f; letter-spacing:.2em; text-transform:uppercase; text-align:center; margin-bottom:14px; }
    .prev-item { color:#1a1a28; font-size:14px; line-height:1.8; margin-bottom:14px; word-break:keep-all; transition:color .3s; }
    .prev-item:hover { color:#2e2e45; }

    /* 워터마크 */
    .wm { position:fixed; bottom:12px; left:50%; transform:translateX(-50%); font-size:9px; color:#101018; letter-spacing:.2em; text-transform:uppercase; }
  </style>
</head>
<body>

<div class="topline"></div>

<!-- 연결 상태 -->
<div class="status">
  <div id="sDot" class="s-dot live"></div>
  <span id="sTxt" class="s-txt">연결 중...</span>
</div>

<!-- 폰트 조절 -->
<div class="fbtns">
  <button class="fbtn" onclick="fs(-2)" title="작게">A−</button>
  <button class="fbtn" onclick="fs(+2)" title="크게">A+</button>
</div>

<!-- 메인 텍스트 -->
<div class="content">
  <div id="waiting" class="waiting">
    <div class="waiting-cross">✝</div>
    <div class="waiting-msg">설교 번역을 기다리는 중입니다...</div>
  </div>
  <div id="mainTxt" style="display:none;"></div>
</div>

<!-- 이전 내용 -->
<div id="prevSec" class="prev" style="display:none;">
  <div class="prev-lbl">이전 내용</div>
  <div id="prevList"></div>
</div>

<div class="wm">✝ Sermon Live Translation</div>

<script>
  /* ── 폰트 크기 ── */
  let fontSize = parseInt(localStorage.getItem('fs') || 26);
  document.documentElement.style.setProperty('--fs', fontSize + 'px');
  function fs(d) {
    fontSize = Math.max(14, Math.min(52, fontSize + d));
    document.documentElement.style.setProperty('--fs', fontSize + 'px');
    localStorage.setItem('fs', fontSize);
  }

  /* ── Pusher 연결 ──
     PUSHER_KEY 와 PUSHER_CLUSTER 는
     Vercel 환경변수에서 주입되지 않고
     빌드타임에 HTML에 직접 삽입되어야 합니다.
     아래 값을 발급받은 실제 키로 교체하세요.  */
  const PUSHER_KEY     = '9970878443f485296baf';      // ← 여기에 Pusher Key 입력
  const PUSHER_CLUSTER = 'mt1';  // ← 여기에 Pusher Cluster 입력

  const prevTexts = [];

  try {
    const pusher = new Pusher(PUSHER_KEY, {
      cluster: PUSHER_CLUSTER,
      forceTLS: true
    });

    const channel = pusher.subscribe('sermon');

    pusher.connection.bind('connected', () => {
      document.getElementById('sDot').className = 's-dot ok';
      document.getElementById('sTxt').textContent = '실시간 연결됨';
    });

    pusher.connection.bind('disconnected', () => {
      document.getElementById('sDot').className = 's-dot err';
      document.getElementById('sTxt').textContent = '연결 끊김 — 새로고침 해주세요';
    });

    pusher.connection.bind('connecting', () => {
      document.getElementById('sDot').className = 's-dot live';
      document.getElementById('sTxt').textContent = '연결 중...';
    });

    /* 번역 수신 */
    channel.bind('translation', data => {
      showText(data.korean);
    });

  } catch(e) {
    document.getElementById('sDot').className = 's-dot err';
    document.getElementById('sTxt').textContent = 'Pusher 키 오류 — 설정 확인 필요';
  }

  /* ── 텍스트 표시 ── */
  function showText(korean) {
    const el = document.getElementById('mainTxt');

    // 현재 내용을 이전 목록으로
    if (el.textContent) {
      prevTexts.unshift(el.textContent);
      if (prevTexts.length > 5) prevTexts.pop();
      const sec  = document.getElementById('prevSec');
      const list = document.getElementById('prevList');
      sec.style.display = 'block';
      list.innerHTML = prevTexts.map(t =>
        `<div class="prev-item">${t}</div>`
      ).join('');
    }

    // 새 번역 표시
    document.getElementById('waiting').style.display = 'none';
    el.style.display = 'block';
    el.textContent = korean;
    el.classList.remove('appear');
    void el.offsetWidth;          // 애니메이션 재시작 트릭
    el.classList.add('appear');
  }
</script>
</body>
</html>
