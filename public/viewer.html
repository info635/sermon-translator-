
<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#111110"/>
  <title>WORSHIPONAIR</title>
  <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=Noto+Serif+KR:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --fs:22px; --topbar:72px; --bottombar:72px; }

    /* ── THEMES ── */
    [data-theme="dark"] {
      --bg:         #111110;
      --surface:    #1a1a18;
      --surface2:   #222220;
      --border:     rgba(255,255,255,.08);
      --text:       #f0ede6;
      --text2:      #9a9790;
      --text3:      #444440;
      --accent:     #e08c1a;
      --accent-dim: rgba(224,140,26,.12);
      --accent-bar: rgba(224,140,26,.5);
      --bar-bg:     rgba(26,26,24,.92);
      --overlay:    rgba(17,17,16,.96);
    }
    [data-theme="light"] {
      --bg:         #f8f7f4;
      --surface:    #ffffff;
      --surface2:   #f0ede8;
      --border:     rgba(0,0,0,.08);
      --text:       #18170f;
      --text2:      #6a6860;
      --text3:      #c0bdb5;
      --accent:     #c97005;
      --accent-dim: rgba(201,112,5,.08);
      --accent-bar: rgba(201,112,5,.4);
      --bar-bg:     rgba(248,247,244,.94);
      --overlay:    rgba(248,247,244,.97);
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif KR', Georgia, serif;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background .3s, color .3s;
    }

    /* ════════════════════════════
       TOP BAR — 2줄 모바일 최적화
    ════════════════════════════ */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      top: env(safe-area-inset-top, 0px);
      height: var(--topbar);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 6px 14px;
      gap: 5px;
      background: var(--bar-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    /* 1행: 로고 + 오른쪽 버튼들 */
    .tb-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    /* 2행: 연결상태 + 언어배지 */
    .tb-row2 {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 로고 */
    .tb-logo { display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .tb-logo img { width:26px; height:26px; border-radius:6px; object-fit:cover; }
    .tb-logo-txt { display:flex; flex-direction:column; gap:1px; }
    .tb-logo-title { font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; line-height:1; color:var(--text); font-family:'Noto Sans KR',sans-serif; }
    .tb-logo-sub { font-size:8px; color:var(--text3); letter-spacing:.05em; line-height:1; font-family:'Noto Sans KR',sans-serif; }

    /* 언어 배지 — 작게 */
    .lang-badge {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-bar);
      font-size: 11px; font-weight: 600;
      color: var(--accent);
      font-family: 'Noto Sans KR', sans-serif;
      white-space: nowrap;
    }

    /* 연결 상태 — 작게 */
    .conn-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      font-size: 10px;
      color: var(--text2);
      font-family: 'Noto Sans KR', sans-serif;
      white-space: nowrap;
    }
    .conn-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--text3); flex-shrink:0;
      transition: background .3s;
    }
    .conn-dot.connected  { background: #34d058; animation: cpulse 2.5s infinite; }
    .conn-dot.connecting { background: var(--accent); animation: cpulse .9s infinite; }
    .conn-dot.offline    { background: #f85149; }
    @keyframes cpulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* 오른쪽 버튼 그룹 */
    .tb-right { display:flex; align-items:center; gap:6px; }

    /* UI 언어 토글 */
    .ui-seg {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 2px; gap: 2px;
    }
    .ui-seg-btn {
      padding: 4px 10px;
      border-radius: 5px; border: none;
      background: transparent;
      color: var(--text2);
      font-size: 11px; font-weight: 500;
      cursor: pointer; font-family: 'Noto Sans KR',sans-serif;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .ui-seg-btn.on {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 3px rgba(0,0,0,.25);
    }

    /* 테마 버튼 */
    .icon-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .icon-btn:active { background: var(--accent-dim); }

    /* ════════════════════════════
       OFFLINE BANNER
    ════════════════════════════ */
    .offline-bar {
      position: fixed;
      top: calc(var(--topbar) + env(safe-area-inset-top, 0px));
      left: 0; right: 0;
      background: #2a1800;
      border-bottom: 1px solid #5a3800;
      color: #fbbf24;
      font-size: 12px; text-align: center;
      padding: 8px 16px;
      font-family: 'Noto Sans KR',sans-serif;
      display: none; z-index: 99;
    }
    [data-theme="light"] .offline-bar { background:#fffbeb; border-color:#fde68a; color:#92400e; }
    .offline-bar.show { display: block; }

    /* ════════════════════════════
       SCROLL AREA
    ════════════════════════════ */
    .scroll-area {
      padding-top: calc(var(--topbar) + env(safe-area-inset-top, 0px));
      padding-bottom: calc(var(--bottombar) + env(safe-area-inset-bottom, 0px));
      min-height: 100dvh;
    }

    /* ════════════════════════════
       WAITING STATE
    ════════════════════════════ */
    .waiting {
      min-height: 70dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 48px 32px;
    }
    .waiting-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .waiting-title {
      font-size: 18px; font-weight: 500;
      color: var(--text);
      text-align: center; line-height: 1.6;
      font-family: 'Noto Sans KR',sans-serif;
    }
    .waiting-sub {
      font-size: 13px;
      color: var(--text2);
      text-align: center; line-height: 1.8;
      font-family: 'Noto Sans KR',sans-serif;
      font-weight: 300;
    }
    /* pulse ring */
    .pulse-ring {
      position: relative;
      width: 12px; height: 12px;
    }
    .pulse-ring::before, .pulse-ring::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50%;
      background: var(--accent);
    }
    .pulse-ring::before { animation: ring 2s infinite; }
    .pulse-ring::after  { animation: ring 2s .4s infinite; }
    @keyframes ring {
      0%   { transform:scale(1); opacity:.8; }
      100% { transform:scale(3); opacity:0; }
    }

    /* ════════════════════════════
       TRANSCRIPT — reading-optimized
    ════════════════════════════ */
    .transcript { padding: 0; }

    .t-item {
      padding: 20px 20px 22px;
      border-bottom: 1px solid var(--border);
      word-break: break-word;
      overflow-wrap: break-word;
    }

    /* 최신 항목 */
    .t-item.latest {
      background: var(--accent-dim);
      border-left: 3px solid var(--accent);
      padding-left: 17px;
    }

    .t-body {
      font-size: var(--fs);
      line-height: 1.95;
      color: var(--text);
      letter-spacing: -.01em;
    }

    .t-time {
      font-size: 10px;
      color: var(--text3);
      font-family: 'Noto Sans KR',sans-serif;
      font-weight: 300;
      letter-spacing: .04em;
      margin-bottom: 8px;
    }

    .t-label {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px;
      color: var(--accent);
      font-family: 'Noto Sans KR',sans-serif;
      font-weight: 500;
      margin-bottom: 6px;
      opacity: .8;
    }

    @keyframes slideUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:none; }
    }
    .appear { animation: slideUp .35s cubic-bezier(.2,.8,.3,1) both; }

    /* ════════════════════════════
       BOTTOM BAR
    ════════════════════════════ */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--bottombar) + env(safe-area-inset-bottom, 0px));
      padding: 0 16px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: var(--bar-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between;
      z-index: 100;
      gap: 12px;
    }

    /* 글자 크기 컨트롤 — 큼직하게 */
    .fs-ctrl {
      display: flex; align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      height: 44px;
    }
    .fs-btn {
      width: 48px; height: 44px;
      border: none; background: transparent;
      color: var(--text); font-family: 'Noto Sans KR',sans-serif;
      font-size: 16px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
      user-select: none;
    }
    .fs-btn:active { background: var(--accent-dim); color: var(--accent); }
    .fs-mid {
      width: 1px; height: 24px; background: var(--border); flex-shrink:0;
    }
    .fs-val {
      width: 42px;
      text-align: center;
      font-size: 12px;
      color: var(--text2);
      font-family: 'Noto Sans KR',sans-serif;
    }

    /* 하단 우측 버튼 그룹 */
    .bb-actions { display:flex; align-items:center; gap:8px; }
    .bb-btn {
      width: 44px; height: 44px;
      border-radius: 11px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .bb-btn:active { background: var(--accent-dim); }

    /* ════════════════════════════
       NEW TRANSLATION TOAST
    ════════════════════════════ */
    .new-toast {
      position: fixed;
      bottom: calc(var(--bottombar) + env(safe-area-inset-bottom, 0px) + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: var(--accent);
      color: #fff;
      font-size: 13px; font-weight: 600;
      font-family: 'Noto Sans KR',sans-serif;
      padding: 10px 20px;
      border-radius: 24px;
      cursor: pointer;
      opacity: 0;
      transition: opacity .22s, transform .22s;
      pointer-events: none;
      z-index: 101;
      white-space: nowrap;
      box-shadow: 0 6px 20px rgba(0,0,0,.35);
      -webkit-tap-highlight-color: transparent;
    }
    .new-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }

    /* ════════════════════════════
       CLEAR MODAL
    ════════════════════════════ */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 300;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .modal-bg.show { display: flex; }

    .modal-sheet {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 12px 20px 28px;
      width: 100%;
      max-width: 480px;
    }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-icon { font-size: 32px; text-align:center; margin-bottom:12px; }
    .modal-title {
      font-size: 17px; font-weight: 600;
      color: var(--text); text-align:center;
      margin-bottom: 8px;
      font-family: 'Noto Sans KR',sans-serif;
    }
    .modal-desc {
      font-size: 14px; color: var(--text2);
      text-align:center; line-height: 1.7;
      margin-bottom: 24px;
      font-family: 'Noto Sans KR',sans-serif;
      font-weight: 300;
    }
    .modal-btns { display:flex; gap:10px; }
    .modal-cancel {
      flex: 1; padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 15px; font-family: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-confirm {
      flex: 1; padding: 14px;
      border-radius: 12px;
      border: none;
      background: #f85149;
      color: #fff;
      font-size: 15px; font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ════════════════════════════
       RECONNECT OVERLAY
    ════════════════════════════ */
    .rc-overlay {
      position: fixed; inset: 0;
      background: var(--overlay);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 200;
    }
    .rc-overlay.show { display: flex; }
    .rc-spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
    .rc-msg  { font-size: 15px; color: var(--text2); font-family:'Noto Sans KR',sans-serif; }
    .rc-sub  { font-size: 12px; color: var(--accent); font-family:'Noto Sans KR',sans-serif; }

    ::-webkit-scrollbar { width: 0; height: 0; }
  </style>
</head>

<div class="scroll-area">

    <div class="waiting-title" id="waitingTitle"></div>
    <div class="waiting-sub" id="waitingSub"></div>
    <div class="pulse-ring"></div>

  <!-- 번역 목록 -->
  <div class="transcript" id="transcript" style="display:none;"></div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <!-- 글자 크기 -->
  <div class="fs-ctrl">
    <button class="fs-btn" onclick="changeFontSize(-2)" aria-label="글자 작게">A−</button>
    <div class="fs-mid"></div>
    <span class="fs-val" id="fsVal">22</span>
    <div class="fs-mid"></div>
    <button class="fs-btn" onclick="changeFontSize(+2)" aria-label="글자 크게">A+</button>
  </div>

  <!-- 우측 버튼 -->
  <div class="bb-actions">
    <button class="bb-btn" onclick="scrollToLatest()" id="scrollBtn" title="최신으로">↓</button>
    <button class="bb-btn" onclick="showClearModal()">🗑️</button>
  </div>
</div>

<!-- 새 번역 토스트 -->
<div class="new-toast" id="newToast" onclick="scrollToLatest()"></div>

<!-- 삭제 확인 모달 (bottom sheet) -->
<div class="modal-bg" id="modalBg" onclick="hideModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-icon">🗑️</div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-desc"  id="modalDesc"></div>
    <div class="modal-btns">
      <button class="modal-cancel"  id="modalCancel"  onclick="hideModal()"></button>
      <button class="modal-confirm" id="modalConfirm" onclick="clearAll()"></button>
    </div>
  </div>
</div>

<!-- 재연결 오버레이 -->
<div class="rc-overlay" id="rcOverlay">
  <div class="rc-spinner"></div>
  <div class="rc-msg" id="rcMsg"></div>
  <div class="rc-sub" id="rcSub"></div>
</div>

<script>
  /* ── Pusher 키 설정 ── */
  const PUSHER_KEY     = '9970878443f485296baf';
  const PUSHER_CLUSTER = 'mt1';

  /* ── 언어 정보 ── */
  const LANG_INFO = {
    ko:    { flag:'🇰🇷', name:'한국어',  nameEn:'Korean'   },
    en:    { flag:'🇺🇸', name:'English', nameEn:'English'  },
    es:    { flag:'🇪🇸', name:'Español', nameEn:'Spanish'  },
    'zh-cn':{ flag:'🇨🇳', name:'普通话',  nameEn:'Mandarin' },
    'zh-hk':{ flag:'🇭🇰', name:'廣東話',  nameEn:'Cantonese'},
    fa:    { flag:'🇮🇷', name:'فارسی',   nameEn:'Persian'  },
    pa:    { flag:'🇮🇳', name:'ਪੰਜਾਬੀ',  nameEn:'Punjabi'  },
  };

  const params      = new URLSearchParams(location.search);
  const currentLang = params.get('lang') || 'ko';
  const langInfo    = LANG_INFO[currentLang] || LANG_INFO.ko;
  document.title    = langInfo.flag + ' WORSHIPONAIR';

  /* ── 다국어 텍스트 ── */
  let uiLang = localStorage.getItem('viewer-ui-lang') || 'ko';

  const T = {
    waitingTitle: { ko:'번역 대기 중', en:'Waiting for Translation' },
    waitingSub:   { ko:'설교 번역이 시작되면\n여기에 자동으로 표시됩니다', en:'Translations will appear here\nautomatically when the sermon begins' },
    newToast:     { ko:'↓ 새 번역이 도착했습니다', en:'↓ New translation arrived' },
    connecting:   { ko:'연결 중...', en:'Connecting...' },
    connected:    { ko:'실시간 연결됨', en:'Live' },
    disconnected: { ko:'연결 끊김', en:'Disconnected' },
    failed:       { ko:'연결 실패', en:'Failed' },
    unavailable:  { ko:'서버 없음', en:'Unavailable' },
    offline:      { ko:'오프라인', en:'Offline' },
    retryFail:    { ko:'새로고침 필요', en:'Please refresh' },
    connLost:     { ko:'연결이 끊겼습니다', en:'Connection lost' },
    retrying:     { ko:'번째 시도 중 (', en:' attempt (' },
    sec:          { ko:'초 후)', en:'s)' },
    offlineBan:   { ko:'인터넷 연결이 끊겼습니다 — 자동 재연결 중', en:'Internet disconnected — reconnecting' },
    clearTitle:   { ko:'번역 기록을 삭제하시겠습니까?', en:'Clear translation history?' },
    clearDesc:    { ko:'저장된 번역 내용이 모두 삭제됩니다.\n이 작업은 되돌릴 수 없습니다.', en:'All saved translations will be deleted.\nThis cannot be undone.' },
    cancel:       { ko:'취소', en:'Cancel' },
    delete:       { ko:'삭제', en:'Delete' },
    scrollDown:   { ko:'최신으로', en:'Latest' },
  };

  function t(k) { return T[k]?.[uiLang] ?? T[k]?.ko ?? k; }

  function setUILang(lang) {
    uiLang = lang;
    localStorage.setItem('viewer-ui-lang', lang);
    document.getElementById('ui-ko').classList.toggle('on', lang==='ko');
    document.getElementById('ui-en').classList.toggle('on', lang==='en');
    renderTexts();
  }

  function renderTexts() {
    // 언어 배지
    document.getElementById('langBadge').textContent =
      langInfo.flag + ' ' + (uiLang==='ko' ? langInfo.name : langInfo.nameEn);

    // 대기 화면
    document.getElementById('waitingTitle').textContent = t('waitingTitle');
    document.getElementById('waitingSub').innerHTML = t('waitingSub').replace('\n','<br>');

    // 토스트
    document.getElementById('newToast').textContent = t('newToast');

    // 모달
    document.getElementById('modalTitle').textContent  = t('clearTitle');
    document.getElementById('modalDesc').innerHTML     = t('clearDesc').replace('\n','<br>');
    document.getElementById('modalCancel').textContent = t('cancel');
    document.getElementById('modalConfirm').textContent= t('delete');

    // 오버레이
    document.getElementById('rcMsg').textContent = t('connLost');
    document.getElementById('offlineBar').textContent = t('offlineBan');
  }

  /* ── 테마 (기본: 다크) ── */
  const savedTheme = localStorage.getItem('sermon-theme') || 'dark';
  applyTheme(savedTheme);

  function applyTheme(th) {
    document.documentElement.setAttribute('data-theme', th);
    document.getElementById('themeBtn').textContent = th==='dark' ? '☀️' : '🌙';
    document.querySelector('meta[name="theme-color"]').content = th==='dark' ? '#111110' : '#f8f7f4';
    localStorage.setItem('sermon-theme', th);
  }
  function toggleTheme() {
    applyTheme(document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark');
  }

  /* ── 글자 크기 ── */
  let fontSize = parseInt(localStorage.getItem('sermon-fs') || 22);
  applyFS();
  function changeFontSize(d) {
    fontSize = Math.max(14, Math.min(48, fontSize + d));
    applyFS();
    localStorage.setItem('sermon-fs', fontSize);
  }
  function applyFS() {
    document.documentElement.style.setProperty('--fs', fontSize + 'px');
    document.getElementById('fsVal').textContent = fontSize;
  }

  /* ── 이전 내용 복원 ── */
  const saved = JSON.parse(localStorage.getItem('sermon-transcript') || '[]');
  if (saved.length > 0) {
    document.getElementById('waiting').style.display = 'none';
    document.getElementById('transcript').style.display = 'block';
    saved.forEach((item, i) => addItem(item.text || item, item.time || null, false, i === saved.length - 1));
    setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'instant' }), 50);
  }

  let allItems = saved.map(x => typeof x === 'string' ? { text: x, time: null } : x);
  let pusher = null, retryCount = 0, retryTimer = null;

  /* ── 연결 상태 ── */
  function setStatus(cls, msg) {
    document.getElementById('sDot').className = 'conn-dot ' + cls;
    document.getElementById('sTxt').textContent = msg;
  }

  /* ── Pusher 연결 ── */
  function connect() {
    try {
      if (pusher) { try { pusher.disconnect(); } catch(e){} }
      pusher = new Pusher(PUSHER_KEY, {
        cluster: PUSHER_CLUSTER, forceTLS: true,
        activityTimeout: 30000, pongTimeout: 15000,
      });
      pusher.connection.bind('connecting',  () => setStatus('connecting',  t('connecting')));
      pusher.connection.bind('connected',   () => {
        setStatus('connected', t('connected'));
        retryCount = 0;
        document.getElementById('rcOverlay').classList.remove('show');
        document.getElementById('offlineBar').classList.remove('show');
      });
      pusher.connection.bind('disconnected',() => { setStatus('offline', t('disconnected')); scheduleRetry(); });
      pusher.connection.bind('failed',      () => { setStatus('offline', t('failed'));       scheduleRetry(); });
      pusher.connection.bind('unavailable', () => { setStatus('offline', t('unavailable'));  scheduleRetry(); });

      const ch = pusher.subscribe('sermon-' + currentLang);
      ch.bind('translation', data => showTranslation(data.translated));
    } catch(e) { setStatus('offline', 'Error'); scheduleRetry(); }
  }

  function scheduleRetry() {
    if (retryCount >= 10) {
      setStatus('offline', t('retryFail'));
      document.getElementById('rcOverlay').classList.remove('show');
      return;
    }
    const delay = Math.min(2000 * Math.pow(1.5, retryCount), 30000);
    retryCount++;
    document.getElementById('rcOverlay').classList.add('show');
    document.getElementById('rcMsg').textContent = t('connLost');
    document.getElementById('rcSub').textContent = retryCount + t('retrying') + Math.round(delay/1000) + t('sec');
    clearTimeout(retryTimer);
    retryTimer = setTimeout(connect, delay);
  }

  window.addEventListener('online',  () => {
    document.getElementById('offlineBar').classList.remove('show');
    retryCount = 0; clearTimeout(retryTimer); connect();
  });
  window.addEventListener('offline', () => {
    document.getElementById('offlineBar').classList.add('show');
    setStatus('offline', t('offline'));
  });
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && (!pusher || pusher.connection.state !== 'connected')) {
      retryCount = 0; clearTimeout(retryTimer); connect();
    }
  });

  /* ── 항목 추가 ── */
  function addItem(text, time, animate, isLatest) {
    const wrap = document.createElement('div');
    wrap.className = 't-item' + (isLatest ? ' latest' : '') + (animate ? ' appear' : '');

    if (time) {
      const ts = document.createElement('div');
      ts.className = 't-time';
      ts.textContent = time;
      wrap.appendChild(ts);
    }

    const body = document.createElement('div');
    body.className = 't-body';
    body.textContent = text;
    wrap.appendChild(body);

    document.getElementById('transcript').appendChild(wrap);
    return wrap;
  }

  /* ── 번역 표시 ── */
  function showTranslation(text) {
    document.getElementById('waiting').style.display = 'none';
    const tr = document.getElementById('transcript');
    tr.style.display = 'block';

    // 스크롤 위치 유지
    const scrollY = window.scrollY;
    const scrollEl = document.scrollingElement || document.documentElement;

    // 이전 latest 해제
    const prev = tr.querySelector('.t-item.latest');
    if (prev) prev.classList.remove('latest');

    // 새 항목 추가
    const now = new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
    addItem(text, now, false, true);

    // 스크롤 위치 복원
    scrollEl.scrollTop = scrollY;
    window.scrollTo({ top: scrollY, behavior: 'instant' });
    requestAnimationFrame(() => {
      window.scrollTo({ top: scrollY, behavior: 'instant' });
      requestAnimationFrame(() => window.scrollTo({ top: scrollY, behavior: 'instant' }));
    });

    setStatus('connected', t('connected'));

    // 저장
    const time = now;
    allItems.push({ text, time });
    if (allItems.length > 50) allItems.shift();
    localStorage.setItem('sermon-transcript', JSON.stringify(allItems));

    // 새 번역 토스트
    const toast = document.getElementById('newToast');
    toast.classList.remove('show');
    void toast.offsetWidth;
    toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.classList.remove('show'), 5000);
  }

  /* ── 스크롤 감지 ── */
  window.addEventListener('scroll', () => {
    const dist = document.body.scrollHeight - window.scrollY - window.innerHeight;
    if (dist <= 120) document.getElementById('newToast').classList.remove('show');
  }, { passive: true });

  function scrollToLatest() {
    const latest = document.querySelector('.t-item.latest');
    if (latest) latest.scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.getElementById('newToast').classList.remove('show');
  }

  /* ── 삭제 모달 ── */
  function showClearModal() { document.getElementById('modalBg').classList.add('show'); }
  function hideModal(e) {
    if (!e || e.target === document.getElementById('modalBg'))
      document.getElementById('modalBg').classList.remove('show');
  }
  function clearAll() {
    const tr = document.getElementById('transcript');
    tr.innerHTML = ''; tr.style.display = 'none';
    document.getElementById('waiting').style.display = 'flex';
    allItems = [];
    localStorage.removeItem('sermon-transcript');
    document.getElementById('modalBg').classList.remove('show');
  }

  /* ── 초기화 ── */
  setUILang(uiLang);
  connect();
</script>
</body>
</html>
