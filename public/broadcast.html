
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✝ 설교 번역 — 방송실</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=Noto+Serif+KR:wght@400;600&display=swap');
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0b0f18; --panel:#111826; --border:#1c2840;
      --gold:#c9a84c; --gdim:rgba(201,168,76,.15);
      --text:#dde6f0; --dim:#4a6080;
      --green:#4ade80; --red:#f87171; --blue:#60a5fa;
      --purple:#a78bfa;
    }
    body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    /* 헤더 */
    header { background:var(--panel); border-bottom:1px solid var(--border); padding:11px 22px; display:flex; align-items:center; gap:16px; flex-shrink:0; }
    .logo { display:flex; align-items:center; gap:10px; }
    .logo-icon { width:32px; height:32px; background:linear-gradient(135deg,var(--gold),#7a5520); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
    .logo-name { font-size:14px; font-weight:600; }
    .logo-sub  { font-size:10px; color:var(--dim); letter-spacing:.12em; text-transform:uppercase; }
    .badge { display:flex; align-items:center; gap:7px; padding:5px 13px; border-radius:20px; font-size:12px; border:1px solid var(--border); background:rgba(255,255,255,.03); }
    .badge-dot { width:7px; height:7px; border-radius:50%; background:#333; }
    .badge-dot.ok  { background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
    .badge-dot.err { background:var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .viewer-box { margin-left:auto; display:flex; align-items:center; gap:8px; background:var(--gdim); border:1px solid rgba(201,168,76,.3); border-radius:8px; padding:6px 14px; }
    .viewer-box span { font-size:11px; color:var(--dim); }
    .viewer-url { font-size:13px; color:var(--gold); font-weight:500; text-decoration:none; }
    .viewer-url:hover { text-decoration:underline; }
    .copy-btn { background:var(--gdim); border:none; color:var(--gold); padding:4px 10px; border-radius:5px; font-size:11px; cursor:pointer; font-family:inherit; }

    /* ── 번역 방향 바 ── */
    .dir-bar {
      background:#090d18; border-bottom:2px solid var(--border);
      padding:10px 22px; display:flex; flex-direction:column; gap:8px; flex-shrink:0;
    }
    .dir-bar-top { display:flex; align-items:center; gap:10px; }
    .dir-label { font-size:11px; color:var(--dim); white-space:nowrap; }

    /* 방향 버튼 그룹 — 2줄 고정 */
    .dir-btns { display:flex; flex-direction:column; gap:6px; }
    .dir-row   { display:flex; gap:6px; }
    .dir-row .dir-btn { flex:1; text-align:center; }
    .dir-btn {
      padding:6px 13px; border-radius:8px; border:1px solid var(--border);
      background:transparent; color:var(--dim);
      font-size:12px; font-weight:600; cursor:pointer;
      font-family:inherit; transition:all .2s; white-space:nowrap;
    }
    .dir-btn.active-auto   { background:rgba(201,168,76,.15); border-color:var(--gold);    color:var(--gold);   }
    .dir-btn.active-en-ko  { background:rgba(96,165,250,.12); border-color:var(--blue);    color:var(--blue);   }
    .dir-btn.active-ko-en  { background:rgba(167,139,250,.12); border-color:var(--purple); color:var(--purple); }
    .dir-btn.active-en-tl  { background:rgba(52,211,153,.12);  border-color:#34d399;       color:#34d399; }
    .dir-btn.active-en-es  { background:rgba(251,146,60,.12);  border-color:#fb923c;       color:#fb923c; }
    .dir-btn.active-en-zh  { background:rgba(248,113,113,.12); border-color:#f87171;       color:#f87171; }
    .dir-btn:hover { border-color:#2c3f58; color:var(--text); }

    /* 현재 방향 표시 */
    .dir-indicator {
      display:flex; align-items:center; gap:8px;
      padding:5px 12px; border-radius:8px;
      border:1px solid var(--border); background:rgba(255,255,255,.02);
      font-size:12px; font-weight:600; white-space:nowrap;
    }
    .dir-arrow { font-size:14px; }

    /* 참고자료 바 */
    .ref-bar { background:#0a1020; border-bottom:1px solid var(--border); padding:9px 22px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .ref-upload-btn { display:flex; align-items:center; gap:8px; padding:7px 16px; border-radius:9px; border:none; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; background:linear-gradient(135deg,#0f1f3a,#162a4a); color:var(--blue); border:1px solid #1e3a5a; white-space:nowrap; transition:all .2s; }
    .ref-upload-btn:hover { border-color:#2a5a8a; }
    .ref-status { flex:1; display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.02); border:1px solid var(--border); border-radius:8px; padding:6px 14px; font-size:12px; color:#3a5070; min-height:34px; }
    .ref-status.loaded { border-color:#1e3a5a; color:var(--blue); }
    .ref-status.loaded .ref-dot { background:var(--blue); box-shadow:0 0 6px var(--blue); }
    .ref-dot { width:6px; height:6px; border-radius:50%; background:#2a3a50; flex-shrink:0; }
    .ref-clear { background:transparent; border:1px solid var(--border); color:#3a5070; padding:4px 11px; border-radius:6px; font-size:11px; cursor:pointer; font-family:inherit; transition:all .2s; }
    .ref-clear:hover { border-color:var(--red); color:var(--red); }
    #fileInput { display:none; }

    /* 마이크 바 */
    .mic-bar { background:#0d1420; border-bottom:1px solid var(--border); padding:11px 22px; display:flex; align-items:center; gap:14px; flex-shrink:0; }
    .mic-btn { display:flex; align-items:center; gap:9px; padding:9px 22px; border-radius:10px; border:none; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; background:linear-gradient(135deg,#1a3a1a,#1f4a1f); color:var(--green); border:1px solid #2a5a2a; transition:all .25s; white-space:nowrap; }
    .mic-btn.on { background:linear-gradient(135deg,#3a0f0f,#5a1a1a); color:var(--red); border-color:#7a2a2a; animation:micGlow 1.5s infinite; }
    @keyframes micGlow { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)} 50%{box-shadow:0 0 0 10px rgba(248,113,113,0)} }
    .interim-box { flex:1; min-height:38px; background:rgba(255,255,255,.02); border:1px solid var(--border); border-radius:8px; padding:8px 14px; font-size:13px; color:#3a5070; font-style:italic; display:flex; align-items:center; }
    .interim-box.active { color:#7aafdf; border-color:#2a4060; font-style:normal; }
    .auto-group { display:flex; align-items:center; gap:8px; white-space:nowrap; }
    .auto-group label { font-size:12px; color:var(--dim); }
    .toggle { position:relative; width:44px; height:24px; background:#1c2840; border-radius:12px; cursor:pointer; border:1px solid var(--border); transition:background .3s; flex-shrink:0; }
    .toggle.on { background:rgba(201,168,76,.35); border-color:var(--gold); }
    .toggle::after { content:''; position:absolute; top:3px; left:3px; width:16px; height:16px; border-radius:50%; background:#4a6080; transition:all .3s; }
    .toggle.on::after { left:23px; background:var(--gold); }
    .gap-group { display:flex; align-items:center; gap:8px; white-space:nowrap; }
    .gap-group label { font-size:12px; color:var(--dim); }
    .gap-group select { background:#1c2840; border:1px solid var(--border); color:var(--text); padding:4px 8px; border-radius:6px; font-size:12px; font-family:inherit; cursor:pointer; outline:none; }

    /* 본문 */
    main { flex:1; display:grid; grid-template-columns:1fr 1fr; min-height:0; }
    .panel { display:flex; flex-direction:column; border-right:1px solid var(--border); min-height:0; }
    .panel:last-child { border-right:none; }
    .panel-top { padding:11px 18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,.015); flex-shrink:0; }
    .panel-label { font-size:10px; color:var(--dim); letter-spacing:.15em; text-transform:uppercase; }
    textarea { flex:1; background:transparent; border:none; color:#b8cce0; font-size:15px; line-height:1.85; padding:18px; resize:none; outline:none; font-family:Georgia,'Noto Serif KR',serif; }
    textarea::placeholder { color:#1e2d40; }
    .panel-bot { padding:11px 18px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
    .btn-main { padding:9px 24px; border-radius:8px; border:none; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; background:linear-gradient(135deg,var(--gold),#8a6020); color:#08080f; }
    .btn-main:disabled { background:#1c2840; color:#2a3a50; cursor:not-allowed; }
    .btn-main:not(:disabled):hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(201,168,76,.3); }
    .translating { font-size:11px; color:var(--gold); display:none; }
    .translating.show { display:block; animation:blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
    .result-area { flex:1; padding:18px; overflow-y:auto; font-family:'Noto Serif KR',serif; }
    .result-hint { color:#1c2840; font-size:15px; line-height:1.8; }
    .result-text { color:#eae0cc; font-size:17px; line-height:2.05; word-break:keep-all; }
    .sent-label  { font-size:11px; color:var(--green); }
    .btn-sm { padding:5px 13px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--dim); font-size:11px; cursor:pointer; font-family:inherit; transition:all .2s; }
    .btn-sm:hover { border-color:#2c3f58; color:var(--text); }

    /* 이력 */
    .history { border-top:1px solid var(--border); background:#090d14; padding:9px 20px; flex-shrink:0; display:none; }
    .history-lbl { font-size:9px; color:#1c2840; letter-spacing:.15em; text-transform:uppercase; margin-bottom:6px; }
    .history-row { display:flex; gap:7px; overflow-x:auto; padding-bottom:3px; }
    .h-item { flex-shrink:0; max-width:200px; background:#0f1520; border:1px solid var(--border); border-radius:6px; padding:6px 11px; cursor:pointer; }
    .h-item:hover { border-color:#2c3f58; }
    .h-time    { font-size:9px; color:#1c2840; margin-bottom:3px; }
    .h-preview { font-size:11px; color:#2c3f58; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* 모달 */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:50; backdrop-filter:blur(4px); }
    .modal-bg.show { display:flex; }
    .modal { background:#0f1826; border:1px solid var(--border); border-radius:14px; width:640px; max-height:80vh; display:flex; flex-direction:column; overflow:hidden; }
    .modal-head { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .modal-title { font-size:14px; font-weight:600; color:var(--blue); }
    .modal-close { background:transparent; border:none; color:var(--dim); font-size:20px; cursor:pointer; }
    .modal-body { flex:1; overflow-y:auto; padding:18px 20px; }
    .modal-txt { font-size:13px; color:#7090b0; line-height:1.85; white-space:pre-wrap; word-break:break-word; }
    .modal-foot { padding:12px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
    .btn-blue { padding:8px 20px; border-radius:8px; border:none; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; background:linear-gradient(135deg,#1a4a8a,#1e5a9a); color:#90c8ff; }

    ::-webkit-scrollbar { width:3px; height:3px; }
    ::-webkit-scrollbar-thumb { background:#1c2840; border-radius:2px; }
    #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1c2840; border:1px solid #2c3f58; color:var(--text); padding:9px 18px; border-radius:8px; font-size:13px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:9; }
    #toast.show { opacity:1; }
  </style>
</head>
<body>

<!-- 헤더 -->
<header>
  <div class="logo">
    <div class="logo-icon">✝</div>
    <div>
      <div class="logo-name">설교 번역 시스템</div>
      <div class="logo-sub">방송실 · Broadcast</div>
    </div>
  </div>
  <div class="badge">
    <div id="dot" class="badge-dot"></div>
    <span id="statusTxt">서버 확인 중...</span>
  </div>
  <div class="viewer-box">
    <span>성도 화면:</span>
    <a id="vUrl" class="viewer-url" href="/viewer" target="_blank">/viewer</a>
    <button class="copy-btn" onclick="copyUrl()">링크 복사</button>
  </div>
</header>

<!-- 번역 방향 바 -->
<div class="dir-bar">
  <div class="dir-bar-top">
    <span class="dir-label">번역 방향</span>
    <div class="dir-indicator" id="dirIndicator">
      <span class="dir-arrow">🔄</span>
      <span id="dirLabel">자동 감지</span>
    </div>
  </div>
  <div class="dir-btns">
    <div class="dir-row">
      <button class="dir-btn active-auto" id="btn-auto"  onclick="setDir('auto')">🔄 자동</button>
      <button class="dir-btn" id="btn-en-ko" onclick="setDir('en-ko')">🇺🇸→🇰🇷 한국어</button>
      <button class="dir-btn" id="btn-ko-en" onclick="setDir('ko-en')">🇰🇷→🇺🇸 영어</button>
    </div>
    <div class="dir-row">
      <button class="dir-btn" id="btn-en-tl" onclick="setDir('en-tl')">🇺🇸→🇵🇭 타갈로그</button>
      <button class="dir-btn" id="btn-en-es" onclick="setDir('en-es')">🇺🇸→🇪🇸 스페인어</button>
      <button class="dir-btn" id="btn-en-zh" onclick="setDir('en-zh')">🇺🇸→🇨🇳 중국어</button>
    </div>
  </div>
</div>

<!-- 참고자료 바 -->
<div class="ref-bar">
  <button class="ref-upload-btn" onclick="document.getElementById('fileInput').click()">
    <span>📎</span><span>참고자료 업로드</span>
  </button>
  <input type="file" id="fileInput" accept=".pdf,.docx,.txt" onchange="handleFile(event)"/>
  <div id="refStatus" class="ref-status">
    <div class="ref-dot"></div>
    <span id="refStatusTxt">PDF · DOCX · TXT 파일을 업로드하면 번역 품질이 향상됩니다</span>
  </div>
  <button id="refPreviewBtn" class="btn-sm" style="display:none;" onclick="showModal()">미리보기</button>
  <button id="refClearBtn" class="ref-clear" style="display:none;" onclick="clearRef()">✕ 삭제</button>
</div>

<!-- 마이크 바 -->
<div class="mic-bar">
  <button id="micBtn" class="mic-btn" onclick="toggleMic()">
    <span>🎤</span><span id="micLabel">음성 인식 시작</span>
  </button>
  <div id="interimBox" class="interim-box">마이크 버튼을 누르면 설교자의 음성을 자동 인식합니다...</div>
  <div class="auto-group">
    <label>자동 번역</label>
    <div id="autoToggle" class="toggle on" onclick="toggleAuto()"></div>
  </div>
  <div class="gap-group">
    <label>번역 간격</label>
    <select id="gapSel">
      <option value="5000">5초</option>
      <option value="10000" selected>10초 ⭐</option>
      <option value="15000">15초</option>
      <option value="30000">30초</option>
    </select>
  </div>
</div>

<!-- 본문 -->
<main>
  <!-- 왼쪽: 원문 -->
  <div class="panel">
    <div class="panel-top">
      <span class="panel-label" id="srcLabel">🎤 원문 입력</span>
      <span id="wc" style="font-size:11px;color:#1c2840;">0 단어</span>
    </div>
    <textarea id="src" placeholder="음성 인식된 텍스트가 자동 입력됩니다.
직접 붙여넣기도 가능합니다.

💡 Ctrl+Enter = 수동 번역"></textarea>
    <div class="panel-bot">
      <span id="spinning" class="translating">● 번역 중...</span>
      <button id="tBtn" class="btn-main" onclick="doTranslate()">번역 →</button>
    </div>
  </div>

  <!-- 오른쪽: 번역 결과 -->
  <div class="panel">
    <div class="panel-top">
      <span class="panel-label" id="resultLabel">번역 결과</span>
      <span id="sentLbl" class="sent-label"></span>
    </div>
    <div class="result-area">
      <div id="hint" class="result-hint">번역 완료 즉시 성도 화면에 자동 전송됩니다.</div>
      <div id="result" class="result-text" style="display:none;"></div>
    </div>
    <div class="panel-bot">
      <div style="display:flex;gap:7px;">
        <button class="btn-sm" onclick="copyKo()">복사</button>
        <button class="btn-sm" onclick="clearAll()">초기화</button>
      </div>
      <span id="lastTime" style="font-size:10px;color:#1c2840;"></span>
    </div>
  </div>
</main>

<!-- 이력 -->
<div class="history" id="hist">
  <div class="history-lbl">최근 번역 이력</div>
  <div id="histRow" class="history-row"></div>
</div>

<!-- 참고자료 모달 -->
<div class="modal-bg" id="modalBg" onclick="hideModal(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">📎 참고자료 내용</span>
      <button class="modal-close" onclick="hideModal()">×</button>
    </div>
    <div class="modal-body"><div id="modalTxt" class="modal-txt"></div></div>
    <div class="modal-foot">
      <button class="btn-sm" onclick="hideModal()">닫기</button>
      <button class="btn-blue" onclick="hideModal()">✅ 확인 — 번역에 적용됨</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }

  const API = '/api/translate';
  const histArr = [];
  let koText = '', isTranslating = false;
  let refText = '', refFileName = '';
  let currentDir = 'auto'; // 'auto' | 'en-ko' | 'ko-en'

  // 뷰어 URL
  const vUrl = location.origin + '/viewer';
  document.getElementById('vUrl').href = vUrl;
  document.getElementById('vUrl').textContent = vUrl;

  // 단어수
  document.getElementById('src').addEventListener('input', updateWC);
  function updateWC() {
    const n = document.getElementById('src').value.split(/\s+/).filter(Boolean).length;
    document.getElementById('wc').textContent = n + ' 단어';
  }

  // ── 번역 방향 설정 ──
  const DIR_CONFIG = {
    'auto':  {
      micLang: 'en-US', // 기본 음성인식 언어
      srcLabel: '🎤 원문 입력 (자동 감지)',
      resultLabel: '번역 결과 (자동)',
      indicator: '🔄 자동 감지 — 언어를 자동으로 판별합니다',
      indicatorIcon: '🔄',
    },
    'en-ko': {
      micLang: 'en-US',
      srcLabel: '🇺🇸 영어 원문',
      resultLabel: '🇰🇷 한국어 번역',
      indicator: '🇺🇸 영어 → 🇰🇷 한국어',
      indicatorIcon: '→',
    },
    'ko-en': {
      micLang: 'ko-KR',
      srcLabel: '🇰🇷 한국어 원문',
      resultLabel: '🇺🇸 English Translation',
      indicator: '🇰🇷 한국어 → 🇺🇸 English',
      indicatorIcon: '→',
    },
    'en-tl': {
      micLang: 'en-US',
      srcLabel: '🇺🇸 English (원문)',
      resultLabel: '🇵🇭 Tagalog Translation (MBB)',
      indicator: '🇺🇸 English → 🇵🇭 Tagalog · Magandang Balita Biblia',
      indicatorIcon: '→',
    },
    'en-es': {
      micLang: 'en-US',
      srcLabel: '🇺🇸 English (원문)',
      resultLabel: '🇪🇸 Traducción al Español (RV60)',
      indicator: '🇺🇸 English → 🇪🇸 Español · Reina-Valera 1960',
      indicatorIcon: '→',
    },
    'en-zh': {
      micLang: 'en-US',
      srcLabel: '🇺🇸 English (원문)',
      resultLabel: '🇨🇳 中文翻译 (和合本)',
      indicator: '🇺🇸 English → 🇨🇳 简体中文 · 和合本 (CUV)',
      indicatorIcon: '→',
    },
  };

  function setDir(dir) {
    currentDir = dir;
    const cfg = DIR_CONFIG[dir];

    // 버튼 스타일 업데이트
    document.getElementById('btn-auto').className  = 'dir-btn' + (dir==='auto'  ? ' active-auto'  : '');
    document.getElementById('btn-en-ko').className = 'dir-btn' + (dir==='en-ko' ? ' active-en-ko' : '');
    document.getElementById('btn-ko-en').className = 'dir-btn' + (dir==='ko-en' ? ' active-ko-en' : '');
    document.getElementById('btn-en-tl').className = 'dir-btn' + (dir==='en-tl' ? ' active-en-tl' : '');
    document.getElementById('btn-en-es').className = 'dir-btn' + (dir==='en-es' ? ' active-en-es' : '');
    document.getElementById('btn-en-zh').className = 'dir-btn' + (dir==='en-zh' ? ' active-en-zh' : '');

    // 라벨 업데이트
    document.getElementById('srcLabel').textContent    = cfg.srcLabel;
    document.getElementById('resultLabel').textContent = cfg.resultLabel;
    document.getElementById('dirLabel').textContent = cfg.indicator;

    // 마이크가 켜져 있으면 재시작 (언어 변경)
    if (isListening) { stopMic(); setTimeout(startMic, 300); }

    toast(`번역 방향: ${cfg.indicator}`);
  }

  // ── 참고자료 ──
  async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    refFileName = file.name;
    const ext = file.name.split('.').pop().toLowerCase();
    setRefStatus('loading', `⏳ ${file.name} 읽는 중...`);
    try {
      if (ext === 'txt')       refText = await file.text();
      else if (ext === 'pdf')  refText = await extractPDF(file);
      else if (ext === 'docx') refText = await extractDOCX(file);
      else { toast('❌ PDF, DOCX, TXT만 지원합니다'); return; }
      if (refText.length > 8000) refText = refText.slice(0, 8000) + '\n\n[... 이하 생략 ...]';
      setRefStatus('loaded', `✅ ${file.name} (${Math.round(refText.length/100)/10}KB 로드됨)`);
      document.getElementById('refPreviewBtn').style.display = 'block';
      document.getElementById('refClearBtn').style.display = 'block';
      document.getElementById('modalTxt').textContent = refText;
      toast('✅ 참고자료 로드됨 — 번역 시 자동 반영됩니다');
    } catch(err) { setRefStatus('', '❌ 오류: ' + err.message); }
    e.target.value = '';
  }

  async function extractPDF(file) {
    const ab = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(' ') + '\n';
    }
    return text.trim();
  }

  async function extractDOCX(file) {
    const ab = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer: ab });
    return result.value.trim();
  }

  function setRefStatus(state, msg) {
    document.getElementById('refStatus').className = 'ref-status' + (state==='loaded' ? ' loaded' : '');
    document.getElementById('refStatusTxt').textContent = msg;
  }

  function clearRef() {
    refText = ''; refFileName = '';
    setRefStatus('', 'PDF · DOCX · TXT 파일을 업로드하면 번역 품질이 향상됩니다');
    document.getElementById('refPreviewBtn').style.display = 'none';
    document.getElementById('refClearBtn').style.display = 'none';
    toast('참고자료가 삭제됐습니다');
  }

  function showModal() { document.getElementById('modalBg').classList.add('show'); }
  function hideModal(e) {
    if (!e || e.target === document.getElementById('modalBg') || !e.target)
      document.getElementById('modalBg').classList.remove('show');
  }

  // ── 음성 인식 ──
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null, isListening = false, autoMode = true, silenceTimer = null;

  function toggleMic() {
    if (!SpeechRecognition) { toast('❌ Chrome에서만 작동합니다'); return; }
    isListening ? stopMic() : startMic();
  }

  function startMic() {
    recognition = new SpeechRecognition();
    // 방향에 따라 음성인식 언어 자동 설정
    recognition.lang = DIR_CONFIG[currentDir].micLang;
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          const cur = document.getElementById('src').value;
          document.getElementById('src').value = (cur + ' ' + t).trim();
          updateWC();
          if (autoMode) {
            clearTimeout(silenceTimer);
            const gap = parseInt(document.getElementById('gapSel').value);
            silenceTimer = setTimeout(() => {
              if (document.getElementById('src').value.trim() && !isTranslating) doTranslate();
            }, gap);
          }
        } else { interim += t; }
      }
      const box = document.getElementById('interimBox');
      if (interim) { box.textContent = '🎤 ' + interim; box.classList.add('active'); }
      else { box.textContent = '✅ 인식 중...'; box.classList.remove('active'); }
    };

    recognition.onerror = (e) => {
      if (e.error === 'not-allowed') { toast('❌ 마이크 권한을 허용해주세요'); stopMic(); }
    };
    recognition.onend = () => {
      if (isListening) setTimeout(() => { try { recognition.start(); } catch(e){} }, 200);
    };

    try {
      recognition.start();
      isListening = true;
      document.getElementById('micBtn').classList.add('on');
      document.getElementById('micLabel').textContent = '음성 인식 중 — 클릭하면 정지';
      document.getElementById('interimBox').textContent = '🎤 마이크 준비됨';
      document.getElementById('interimBox').classList.add('active');
      toast('🎤 음성 인식 시작됐습니다');
    } catch(e) { toast('마이크 오류: ' + e.message); }
  }

  function stopMic() {
    isListening = false; clearTimeout(silenceTimer);
    if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
    document.getElementById('micBtn').classList.remove('on');
    document.getElementById('micLabel').textContent = '음성 인식 시작';
    document.getElementById('interimBox').textContent = '음성 인식이 중지됐습니다.';
    document.getElementById('interimBox').classList.remove('active');
  }

  function toggleAuto() {
    autoMode = !autoMode;
    document.getElementById('autoToggle').classList.toggle('on', autoMode);
    toast(autoMode ? '✅ 자동 번역 켜짐' : '🔕 자동 번역 꺼짐');
  }

  // ── 번역 실행 ──
  async function doTranslate() {
    const text = document.getElementById('src').value.trim();
    if (!text) { toast('번역할 텍스트가 없습니다'); return; }
    if (isTranslating) return;

    isTranslating = true;
    document.getElementById('tBtn').disabled = true;
    document.getElementById('spinning').classList.add('show');
    document.getElementById('hint').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').textContent = '번역 중...';
    document.getElementById('sentLbl').textContent = '';

    const textToSend = text;
    document.getElementById('src').value = '';
    updateWC();

    try {
      const r = await fetch(API, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ text: textToSend, refText: refText || null, direction: currentDir })
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || '서버 오류');

      koText = d.translated;
      document.getElementById('result').textContent = koText;

      // 실제 번역 방향 표시
      const dirEmojiMap = { 'ko-en':'🇰🇷→🇺🇸', 'en-ko':'🇺🇸→🇰🇷', 'en-tl':'🇺🇸→🇵🇭', 'en-es':'🇺🇸→🇪🇸', 'en-zh':'🇺🇸→🇨🇳' };
      const dirEmoji = dirEmojiMap[d.direction] || '🔄';
      document.getElementById('sentLbl').textContent =
        `✅ ${dirEmoji} 번역 완료 · 성도 화면 전송됨`;
      document.getElementById('lastTime').textContent = new Date().toLocaleTimeString('ko-KR');
      addHistory(textToSend, koText, d.direction);
      toast('✅ 번역 완료 — 성도 화면에 전송됐습니다');

    } catch(e) {
      document.getElementById('src').value = textToSend; updateWC();
      document.getElementById('result').textContent = '오류: ' + e.message;
      toast('❌ ' + e.message);
    }

    isTranslating = false;
    document.getElementById('tBtn').disabled = false;
    document.getElementById('spinning').classList.remove('show');
  }

  function addHistory(src, translated, dir) {
    const dirEmoji = dir === 'ko-en' ? '🇰🇷→🇺🇸' : '🇺🇸→🇰🇷';
    histArr.unshift({ src, translated, dir, t: new Date().toLocaleTimeString('ko-KR') });
    if (histArr.length > 8) histArr.pop();
    document.getElementById('hist').style.display = 'block';
    document.getElementById('histRow').innerHTML = histArr.map((h,i) =>
      `<div class="h-item" onclick="loadH(${i})">
        <div class="h-time">${h.t} ${h.dir==='ko-en'?'🇰🇷→🇺🇸':'🇺🇸→🇰🇷'}</div>
        <div class="h-preview">${h.src.slice(0,45)}...</div>
      </div>`
    ).join('');
  }

  function loadH(i) {
    document.getElementById('src').value = histArr[i].src;
    document.getElementById('result').textContent = histArr[i].translated;
    document.getElementById('result').style.display = 'block';
    document.getElementById('hint').style.display = 'none';
    koText = histArr[i].translated; updateWC();
  }

  // 서버 상태
  fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:'{"text":"ping"}' })
    .then(() => { document.getElementById('dot').className='badge-dot ok'; document.getElementById('statusTxt').textContent='서버 연결됨'; })
    .catch(() => { document.getElementById('dot').className='badge-dot err'; document.getElementById('statusTxt').textContent='서버 오류'; });

  function copyUrl() { navigator.clipboard.writeText(vUrl); toast('성도 링크 복사됨!'); }
  function copyKo()  { if (koText) { navigator.clipboard.writeText(koText); toast('번역문 복사됨!'); } }
  function clearAll() {
    stopMic();
    document.getElementById('src').value = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('hint').style.display = 'block';
    document.getElementById('sentLbl').textContent = '';
    updateWC(); koText = '';
  }
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey||e.metaKey) && e.key === 'Enter') doTranslate();
  });
</script>
</body>
