
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WORSHIPONAIR — Broadcast</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #141413;
      --surface:  #1c1c1a;
      --surface2: #242422;
      --border:   rgba(255,255,255,.09);
      --border2:  rgba(255,255,255,.05);
      --text:     #f0efe9;
      --text2:    #c8c6c0;
      --text3:    #8a8a86;
      --accent:   #d97706;
      --accent-h: #f59e0b;
      --accent-bg:rgba(217,119,6,.12);
      --green:    #22c55e;
      --green-bg: rgba(34,197,94,.1);
      --red:      #ef4444;
      --red-bg:   rgba(239,68,68,.1);
      --r:        8px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans','Noto Sans KR',sans-serif;
      height: 100vh; display: flex; flex-direction: column;
      overflow: hidden; font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* HEADER */
    header {
      height: 68px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 20px; gap: 14px; flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo img { width: 51px; height: 51px; border-radius: 11px; object-fit: cover; }
    .logo-text-wrap { display: flex; flex-direction: column; gap: 1px; }
    .logo-title {
      font-size: 21px; font-weight: 700;
      color: var(--text); letter-spacing: .06em;
      text-transform: uppercase; line-height: 1;
    }
    .logo-sub { font-size: 14px; color: var(--text2); letter-spacing: .08em; line-height: 1; }
    .h-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

    /* Lang UI toggle */
    .ui-lang {
      display: flex; background: var(--surface2);
      border: 1px solid var(--border); border-radius: var(--r);
      padding: 2px; gap: 2px;
    }
    .ui-lang-btn {
      padding: 3px 10px; border-radius: 6px; border: none;
      background: transparent; color: var(--text2);
      font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: inherit; transition: all .15s; white-space: nowrap;
    }
    .ui-lang-btn.on { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.3); }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface2);
      font-size: 14px; color: var(--text3);
    }
    .status-pill.ok  { border-color: rgba(34,197,94,.3); background: var(--green-bg); color: var(--green); }
    .status-pill.err { border-color: rgba(239,68,68,.3); background: var(--red-bg); color: var(--red); }
    .s-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink:0; }
    .status-pill.ok .s-dot  { background: var(--green); animation: pulse 2s infinite; }
    .status-pill.err .s-dot { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* CONTROLS */
    .controls {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 9px 20px; display: flex; align-items: center;
      gap: 8px; flex-shrink: 0; flex-wrap: wrap;
    }
    .c-sep { width:1px; height:20px; background:var(--border); margin:0 4px; flex-shrink:0; }
    .c-label { font-size:14px; color:var(--text2); font-weight:500; white-space:nowrap; }

    .seg { display:flex; background:var(--bg); border:1px solid var(--border); border-radius:var(--r); padding:2px; gap:2px; }
    .seg-btn { padding:4px 12px; border-radius:6px; border:none; background:transparent; color:var(--text2); font-size:15px; font-weight:500; cursor:pointer; font-family:inherit; transition:all .15s; white-space:nowrap; }
    .seg-btn.on { background:var(--surface); color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.3); }

    .mic-btn { display:flex; align-items:center; gap:6px; padding:5px 14px; border-radius:var(--r); border:1px solid var(--border); background:var(--surface2); color:var(--text2); font-size:15px; font-weight:500; cursor:pointer; font-family:inherit; transition:all .15s; white-space:nowrap; }
    .mic-btn:hover { border-color:var(--text3); color:var(--text); }
    .mic-btn.on { background:var(--red-bg); border-color:rgba(239,68,68,.4); color:var(--red); animation:micring 1.6s infinite; }
    @keyframes micring { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.2)} 50%{box-shadow:0 0 0 6px rgba(239,68,68,0)} }
    .mic-ind { width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0; }

    .tog { width:34px; height:18px; background:var(--border); border-radius:9px; cursor:pointer; position:relative; transition:background .2s; flex-shrink:0; border:none; }
    .tog.on { background:var(--accent); }
    .tog::after { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:#fff; transition:left .2s; box-shadow:0 1px 3px rgba(0,0,0,.3); }
    .tog.on::after { left:18px; }

    .c-select { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:4px 8px; border-radius:var(--r); font-size:14px; font-family:inherit; cursor:pointer; outline:none; }

    .file-btn { display:flex; align-items:center; gap:5px; padding:5px 12px; border-radius:var(--r); border:1px solid var(--border); background:var(--surface2); color:var(--text2); font-size:15px; cursor:pointer; font-family:inherit; transition:all .15s; white-space:nowrap; }
    .file-btn:hover { border-color:var(--text3); color:var(--text); }
    .file-btn.loaded { border-color:rgba(59,130,246,.4); background:rgba(59,130,246,.08); color:#60a5fa; }
    #fileInput { display:none; }

    .trans-btn { margin-left:auto; display:flex; align-items:center; gap:7px; padding:6px 18px; border-radius:var(--r); border:none; background:var(--accent); color:#fff; font-size:16px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; white-space:nowrap; }
    .trans-btn:hover:not(:disabled) { background:var(--accent-h); }
    .trans-btn:disabled { background:var(--surface2); color:var(--text3); cursor:not-allowed; }
    .spin { display:none; }
    .spin.on { display:inline; animation:rot .7s linear infinite; }
    @keyframes rot { to{transform:rotate(360deg)} }

    /* LANG STRIP */
    .lang-strip { background:var(--bg); border-bottom:1px solid var(--border); padding:8px 20px; display:flex; align-items:center; gap:6px; flex-shrink:0; flex-wrap:wrap; }
    .ls-label { font-size:14px; color:var(--text2); font-weight:500; white-space:nowrap; }
    .ls-arr { color:var(--text2); font-size:15px; }
    .lang-chip { display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; border:1px solid var(--border); background:var(--surface2); color:var(--text3); font-size:15px; font-weight:400; cursor:pointer; transition:all .15s; user-select:none; }
    .lang-chip.on { border-color:var(--accent); background:var(--accent-bg); color:var(--accent-h); font-weight:500; }
    .lang-chip:not(.on) { opacity:.45; }
    .chip-f { font-size:16px; }
    .chip-b { font-size:11px; color:var(--text3); opacity:.7; }
    .lang-chip.on .chip-b { color:rgba(245,158,11,.6); }
    .ls-links { margin-left:auto; display:flex; gap:5px; flex-wrap:wrap; }
    .ls-link { display:flex; align-items:center; gap:4px; padding:3px 8px; border-radius:5px; background:var(--surface2); border:1px solid var(--border); font-size:12px; }
    .ls-link a { color:#60a5fa; text-decoration:none; font-size:12px; }
    .ls-link a:hover { text-decoration:underline; }
    .ls-copy { background:transparent; border:none; color:var(--text3); cursor:pointer; font-size:12px; padding:0 2px; }
    .ls-copy:hover { color:var(--accent); }

    /* INTERIM */
    .interim { background:var(--surface); border-bottom:1px solid var(--border); padding:7px 20px; min-height:34px; display:flex; align-items:center; flex-shrink:0; }
    .int-txt { font-size:15px; color:var(--text2); font-style:italic; }
    .int-txt.on { color:var(--text2); font-style:normal; }

    /* MAIN */
    main { flex:1; display:grid; grid-template-columns:1fr 1fr; min-height:0; overflow:hidden; }
    .panel { display:flex; flex-direction:column; min-height:0; }
    .panel+.panel { border-left:1px solid var(--border); }
    .panel-head { height:36px; background:var(--surface2); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:10px; flex-shrink:0; }
    .ph-l { font-size:14px; color:var(--text2); font-weight:500; letter-spacing:.03em; }
    .ph-r { margin-left:auto; display:flex; align-items:center; gap:10px; }
    .ph-meta { font-size:14px; color:var(--text2); }
    .ph-ok { font-size:14px; color:var(--green); }
    textarea { flex:1; background:var(--surface); border:none; color:var(--text); font-size:22px; line-height:1.85; padding:18px 20px; resize:none; outline:none; font-family:inherit; }
    textarea::placeholder { color:var(--text2); }

    .rtabs { display:flex; background:var(--surface2); border-bottom:1px solid var(--border); flex-shrink:0; }
    .rtab { padding:8px 14px; font-size:15px; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; transition:all .15s; white-space:nowrap; }
    .rtab.on { color:var(--accent); border-bottom-color:var(--accent); font-weight:500; }
    .rpanes { flex:1; min-height:0; overflow:hidden; background:var(--surface); display:flex; flex-direction:column; }
    .rpane { display:none; flex:1; overflow-y:auto; padding:18px 20px; }
    .rpane.on { display:block; }
    .rpane-txt { color:var(--text); font-size:22px; line-height:1.85; word-break:break-word; }
    .rpane-hint { color:var(--text2); font-size:15px; line-height:1.8; font-style:italic; }

    /* 누적 로그 아이템 */
    .log-item { padding:10px 0; border-bottom:1px solid var(--border2); }
    .log-item:last-child { border-bottom:none; }
    .log-item-time { font-size:12px; color:var(--text3); margin-bottom:4px; }
    .log-item-text { font-size:14px; line-height:1.8; word-break:break-word; color:var(--text); }
    .log-item-error { font-size:15px; color:var(--red); font-style:italic; margin-top:4px; }
    .t-badge { display:none; align-items:center; gap:5px; color:var(--accent); font-size:14px; animation:pulse 1s infinite; }
    .t-badge.on { display:flex; }

    /* HISTORY */
    .hist { background:var(--surface2); border-top:1px solid var(--border); padding:6px 20px; display:none; flex-shrink:0; }
    .hist-row { display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; }
    .hist-row::-webkit-scrollbar { height:2px; }
    .hist-row::-webkit-scrollbar-thumb { background:var(--border); }
    .h-chip { flex-shrink:0; max-width:200px; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:5px 10px; cursor:pointer; transition:border-color .15s; }
    .h-chip:hover { border-color:var(--text3); }
    .h-t { font-size:12px; color:var(--text2); margin-bottom:3px; }
    .h-p { font-size:14px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* MODAL */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.5); backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; z-index:100; }
    .modal-bg.on { display:flex; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:560px; max-height:72vh; display:flex; flex-direction:column; box-shadow:0 20px 40px rgba(0,0,0,.4); }
    .m-head { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .m-title { font-size:14px; font-weight:500; color:var(--text); }
    .m-close { background:transparent; border:none; color:var(--text3); font-size:22px; cursor:pointer; line-height:1; }
    .m-body { flex:1; overflow-y:auto; padding:16px 20px; }
    .m-txt { font-size:15px; color:var(--text2); line-height:1.9; white-space:pre-wrap; word-break:break-word; }
    .m-foot { padding:12px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
    .btn-ghost { padding:6px 14px; border-radius:var(--r); border:1px solid var(--border); background:transparent; color:var(--text2); font-size:15px; cursor:pointer; font-family:inherit; }
    .btn-primary { padding:6px 14px; border-radius:var(--r); border:none; background:var(--accent); color:#fff; font-size:15px; font-weight:500; cursor:pointer; font-family:inherit; }

    #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 16px; border-radius:var(--r); font-size:15px; opacity:0; transition:opacity .2s; pointer-events:none; z-index:200; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,.3); }
    #toast.on { opacity:1; }

    ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  </style>
</head>

<script>
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }

  const API = '/api/translate';

  // ── Production URL 설정 ──────────────────────────────────────
  // Vercel 대시보드 → Domains 에서 확인한 Production URL 입력
  // 예: 'https://sermon-translator.vercel.app'
  // 비워두면 현재 접속 URL 자동 사용
  const PRODUCTION_URL = '';
  // ────────────────────────────────────────────────────────────

  const BASE = PRODUCTION_URL || location.origin;
  const LANGS = {
    ko:{flag:'🇰🇷',name:'한국어'}, en:{flag:'🇺🇸',name:'English'},
    es:{flag:'🇪🇸',name:'Español'},
    'zh-cn':{flag:'🇨🇳',name:'普通话'}, 'zh-hk':{flag:'🇭🇰',name:'廣東話'},
    fa:{flag:'🇮🇷',name:'فارسی'}, pa:{flag:'🇮🇳',name:'ਪੰਜਾਬੀ'},
  };

  let srcLang='en', activeLangs=new Set(['ko']);
  let isTranslating=false, refText='', histArr=[];
  let uiLang = localStorage.getItem('ui-lang') || 'ko';

  // 음성인식 변수 — setUILang이 isListening을 참조하므로 먼저 선언
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition || null;
  let recognition=null, isListening=false, autoMode=true, silTimer=null;

  // ── UI 언어 ──
  function setUILang(lang) {
    uiLang = lang;
    localStorage.setItem('ui-lang', lang);
    document.getElementById('ui-ko').classList.toggle('on', lang==='ko');
    document.getElementById('ui-en').classList.toggle('on', lang==='en');
    // 모든 data-ko/en 요소 업데이트
    document.querySelectorAll('[data-ko]').forEach(el => {
      const txt = el.getAttribute('data-' + lang);
      if (txt !== null && el.tagName !== 'TEXTAREA') el.textContent = txt;
    });
    // textarea placeholder
    document.querySelectorAll('textarea[data-placeholder-ko]').forEach(el => {
      el.placeholder = el.getAttribute('data-placeholder-' + lang);
    });
    // 미녹음중 상태 메시지
    if (!isListening) {
      const intEl = document.getElementById('intBox');
      intEl.textContent = intEl.getAttribute('data-' + lang);
    }
  }
  // 초기 적용
  setUILang(uiLang);

  // ── 원본 언어 ──
  function setSrcLang(lang) {
    srcLang = lang;
    document.getElementById('src-en').classList.toggle('on', lang==='en');
    document.getElementById('src-ko').classList.toggle('on', lang==='ko');
    if (isListening) { stopMic(); setTimeout(startMic, 300); }
    document.querySelectorAll('.lang-chip').forEach(c => {
      c.style.display = c.dataset.lang === lang ? 'none' : '';
      if (c.dataset.lang === lang) activeLangs.delete(lang);
    });
    if (activeLangs.size === 0) {
      const def = lang==='en'?'ko':'en';
      activeLangs.add(def);
      document.querySelector('.lang-chip[data-lang="'+def+'"]')?.classList.add('on');
    }
    renderTabs(); renderLinks();
  }

  function toggleLang(lang) {
    if (lang===srcLang) return;
    const c=document.querySelector('.lang-chip[data-lang="'+lang+'"]');
    if (activeLangs.has(lang)) {
      if (activeLangs.size<=1) { toast(uiLang==='ko'?'최소 1개 선택해주세요':'Select at least 1'); return; }
      activeLangs.delete(lang); c.classList.remove('on');
    } else { activeLangs.add(lang); c.classList.add('on'); }
    renderTabs(); renderLinks();
  }

  function renderLinks() {
    document.getElementById('lsLinks').innerHTML = [...activeLangs].map(l => {
      const url = BASE + '/viewer?lang=' + l;
      const btn = '<button class="ls-copy" onclick="copyText(this.dataset.url)" data-url="' + url + '" title="복사">⧉</button>';
      return '<div class="ls-link"><span>' + LANGS[l].flag + '</span><a href="' + url + '" target="_blank">' + url + '</a>' + btn + '</div>';
    }).join('');
  }

  // 영어 트랜스크립트 저장용
  let enTranscript = [];

  function renderTabs() {
    const tabs=document.getElementById('rTabs');
    const langs=[...activeLangs];
    const cur=tabs.querySelector('.rtab.on')?.dataset.lang||langs[0];
    tabs.innerHTML=langs.map(l=>'<div class="rtab'+(l===cur?' on':'')+'" data-lang="'+l+'" onclick="switchTab(\''+ l +'\')">'+LANGS[l].flag+' '+LANGS[l].name+'</div>').join('');
    // 누적 로그 패널 — 없는 것만 새로 생성
    langs.forEach(l => {
      if (!document.getElementById('pane-'+l)) {
        const pane = document.createElement('div');
        pane.className = 'rpane' + (l===cur?' on':'');
        pane.id = 'pane-'+l;
        pane.innerHTML = '<div style="padding:12px 16px;color:var(--text2);font-size:15px;font-style:italic;" id="hint-'+l+'">'+(uiLang==='ko'?'번역이 완료되면 여기에 누적됩니다':'Translations will accumulate here')+'</div><div id="log-'+l+'" style="padding:0 16px 16px;"></div>';
        document.getElementById('rPanes').appendChild(pane);
      }
    });
    langs.forEach(l => {
      const pane = document.getElementById('pane-'+l);
      if (pane) pane.classList.toggle('on', l===cur);
    });
  }

  function switchTab(l) {
    document.querySelectorAll('.rtab').forEach(t=>t.classList.remove('on'));
    document.querySelectorAll('.rpane').forEach(p=>p.classList.remove('on'));
    document.querySelector('.rtab[data-lang="'+l+'"]')?.classList.add('on');
    document.getElementById('pane-'+l)?.classList.add('on');
  }

  document.querySelector('.lang-chip[data-lang="en"]').style.display='none';
  renderTabs(); renderLinks();

  document.getElementById('src').addEventListener('input', updateWC);
  function updateWC() {
    const n=document.getElementById('src').value.trim().split(/\s+/).filter(Boolean).length;
    document.getElementById('wc').textContent = n+(uiLang==='ko'?' 단어':' words');
  }

  // ── 참고자료 ──
  async function handleFile(e) {
    const file=e.target.files[0]; if(!file) return;
    const ext=file.name.split('.').pop().toLowerCase();
    document.getElementById('refTxt').textContent=uiLang==='ko'?'로딩 중...':'Loading...';
    try {
      if(ext==='txt') refText=await file.text();
      else if(ext==='pdf') refText=await extractPDF(file);
      else if(ext==='docx') refText=await extractDOCX(file);
      else { toast('PDF, DOCX, TXT'); return; }
      if(refText.length>8000) refText=refText.slice(0,8000)+'\n...(생략)';
      document.getElementById('refBtn').className='file-btn loaded';
      document.getElementById('refTxt').textContent=file.name.slice(0,20)+(file.name.length>20?'…':'');
      document.getElementById('refView').style.display='';
      document.getElementById('refDel').style.display='';
      document.getElementById('mTxt').textContent=refText;
      toast(uiLang==='ko'?'참고자료 로드 완료':'Reference loaded');
    } catch(err) {
      document.getElementById('refTxt').textContent=uiLang==='ko'?'참고자료':'Reference';
      toast('Error: '+err.message);
    }
    e.target.value='';
  }

  async function extractPDF(file) {
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let text='';
    for(let i=1;i<=pdf.numPages;i++){const p=await pdf.getPage(i);const c=await p.getTextContent();text+=c.items.map(x=>x.str).join(' ')+'\n';}
    return text.trim();
  }
  async function extractDOCX(file) {
    const ab=await file.arrayBuffer();
    const r=await mammoth.extractRawText({arrayBuffer:ab});
    return r.value.trim();
  }

  function clearRef() {
    refText='';
    document.getElementById('refBtn').className='file-btn';
    document.getElementById('refTxt').textContent=uiLang==='ko'?'참고자료':'Reference';
    document.getElementById('refView').style.display='none';
    document.getElementById('refDel').style.display='none';
    toast(uiLang==='ko'?'참고자료 삭제됨':'Reference cleared');
  }

  function showModal(){document.getElementById('modalBg').classList.add('on');}
  function hideModal(e){if(!e||e.target===document.getElementById('modalBg'))document.getElementById('modalBg').classList.remove('on');}

  // ── 음성인식 ──

  function toggleMic(){
    if (!SR) {
      toast(uiLang==='ko'?'Chrome/Edge에서만 사용 가능합니다':'Chrome/Edge only');
      return;
    }
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      toast(uiLang==='ko'?'음성인식은 HTTPS에서만 작동합니다':'HTTPS required for mic');
      return;
    }
    isListening ? stopMic() : startMic();
  }

  function startMic(){
    try { recognition = new SR(); }
    catch(e) { toast((uiLang==='ko'?'마이크 오류: ':'Mic error: ') + e.message); return; }

    recognition.lang = srcLang==='ko' ? 'ko-KR' : 'en-US';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = e => {
      let interim = '';
      for (let i=e.resultIndex; i<e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          const cur = document.getElementById('src').value;
          document.getElementById('src').value = (cur+' '+t).trim();
          updateWC();
          if (autoMode) {
            clearTimeout(silTimer);
            const gap = parseInt(document.getElementById('gapSel').value);
            // 번역 중이면 타이머 새로 걸지 않음 (짧은 간격에서 중복 호출 방지)
            if (!isTranslating) {
              silTimer = setTimeout(()=>{ if(document.getElementById('src').value.trim()&&!isTranslating) doTranslate(); }, gap);
            }
          }
        } else { interim += t; }
      }
      const b = document.getElementById('intBox');
      if (interim) { b.textContent='● '+interim; b.className='int-txt on'; }
      else { b.textContent=uiLang==='ko'?'✓ 인식 중...':'✓ Listening...'; b.className='int-txt on'; }
    };

    recognition.onerror = e => {
      const msg = {
        'not-allowed':   uiLang==='ko'?'마이크 권한을 허용해주세요 (주소창 왼쪽 🔒 클릭)':'Allow microphone (click 🔒 in address bar)',
        'audio-capture': uiLang==='ko'?'마이크를 찾을 수 없습니다':'No microphone found',
        'network':       uiLang==='ko'?'네트워크 오류 — HTTPS 필요':'Network error — HTTPS required',
        'service-not-allowed': uiLang==='ko'?'음성인식 서비스 차단됨 (HTTPS 필요)':'Speech service blocked — HTTPS required',
      }[e.error];
      if (msg) { toast(msg); stopMic(); }
    };

    recognition.onend = () => {
      if (isListening) setTimeout(()=>{ try { recognition.start(); } catch(e){} }, 300);
    };

    recognition.onstart = () => {
      document.getElementById('micBtn').classList.add('on');
      document.getElementById('micLabel').textContent = uiLang==='ko'?'녹음 중 — 중지':'Recording — Stop';
      document.getElementById('intBox').textContent = uiLang==='ko'?'● 마이크 준비됨':'● Mic ready';
      document.getElementById('intBox').className = 'int-txt on';
    };

    try {
      isListening = true;
      recognition.start();
    } catch(e) {
      isListening = false;
      toast((uiLang==='ko'?'마이크 오류: ':'Mic error: ') + e.message);
    }
  }

  function stopMic(){
    isListening=false; clearTimeout(silTimer);
    if(recognition){try{recognition.stop();}catch(e){} recognition=null;}
    document.getElementById('micBtn').classList.remove('on');
    document.getElementById('micLabel').textContent=uiLang==='ko'?'녹음 시작':'Start Recording';
    document.getElementById('intBox').textContent=uiLang==='ko'?'음성 인식이 중지되었습니다':'Voice recognition stopped';
    document.getElementById('intBox').className='int-txt';
  }

  function toggleAuto(){
    autoMode=!autoMode;
    document.getElementById('autoTog').classList.toggle('on',autoMode);
    toast(autoMode?(uiLang==='ko'?'자동 번역 켜짐':'Auto translate ON'):(uiLang==='ko'?'자동 번역 꺼짐':'Auto translate OFF'));
  }

  // ── 번역 ──
  async function doTranslate(){
    const text=document.getElementById('src').value.trim();
    if(!text){toast(uiLang==='ko'?'번역할 텍스트가 없습니다':'No text to translate');return;}
    if(activeLangs.size===0){toast(uiLang==='ko'?'언어를 선택해주세요':'Select a language');return;}
    if(isTranslating)return;
    isTranslating=true;
    document.getElementById('tBtn').disabled=true;
    document.getElementById('spinEl').classList.add('on');
    document.getElementById('tBadge').classList.add('on');
    document.getElementById('sentLbl').textContent='';
    const tt=text;
    const timeStr=new Date().toLocaleTimeString();
    document.getElementById('src').value=''; updateWC();

    // 번역 중 표시
    activeLangs.forEach(l=>{
      const hint=document.getElementById('hint-'+l);
      if(hint) hint.style.display='none';
    });

    try{
      const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:tt,refText:refText||null,langs:[...activeLangs],srcLang})});
      const d=await res.json();
      if(!res.ok)throw new Error(d.error||'Server error');

      const ls=Object.keys(d.results);

      // 각 언어 로그에 누적 추가
      ls.forEach(l=>{
        appendToLog(l, tt, d.results[l], timeStr, null);
        // 영어 트랜스크립트 저장
        if(l==='en') {
          enTranscript.push({time:timeStr, src:tt, text:d.results[l]});
          document.getElementById('saveTranscriptBtn').style.display='';
        }
      });

      // 에러가 있으면 브로드캐스트에만 표시 (뷰어엔 전송 안 됨)
      if(d.errors){
        Object.keys(d.errors).forEach(l=>{
          appendToLog(l, tt, null, timeStr, d.errors[l]);
        });
      }

      document.getElementById('sentLbl').textContent='✓ '+ls.map(l=>LANGS[l]?.flag||l).join(' ');
      document.getElementById('lastTime').textContent=timeStr;
      toast('✓ '+ls.length+(uiLang==='ko'?'개 언어 번역 완료':' languages sent'));

    }catch(e){
      document.getElementById('src').value=tt; updateWC();
      activeLangs.forEach(l=>{ appendToLog(l, tt, null, timeStr, e.message); });
      toast('Error: '+e.message);
    }
    isTranslating=false;
    document.getElementById('tBtn').disabled=false;
    document.getElementById('spinEl').classList.remove('on');
    document.getElementById('tBadge').classList.remove('on');
  }

  function appendToLog(lang, srcText, translation, timeStr, errorMsg) {
    const log = document.getElementById('log-'+lang);
    if (!log) return;

    const item = document.createElement('div');
    item.className = 'log-item';

    const timeEl = document.createElement('div');
    timeEl.className = 'log-item-time';
    timeEl.textContent = timeStr + ' · ' + srcText.slice(0,40) + (srcText.length>40?'…':'');
    item.appendChild(timeEl);

    if (translation) {
      const textEl = document.createElement('div');
      textEl.className = 'log-item-text';
      textEl.textContent = translation;
      item.appendChild(textEl);
    }
    if (errorMsg) {
      const errEl = document.createElement('div');
      errEl.className = 'log-item-error';
      errEl.textContent = '⚠ ' + errorMsg;
      item.appendChild(errEl);
    }

    log.appendChild(item);
    // 자동 스크롤 (패널 내부)
    const pane = document.getElementById('pane-'+lang);
    if (pane) pane.scrollTop = pane.scrollHeight;
  }

  // 3. 영어 트랜스크립트 저장
  function saveTranscript() {
    if (!enTranscript.length) return;
    const lines = enTranscript.map(function(e) {
      return '[' + e.time + ']\nOriginal: ' + e.src + '\nTranslation: ' + e.text + '\n';
    }).join('\n');
    const blob = new Blob([lines], {type:'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'sermon-transcript-' + new Date().toISOString().slice(0,10) + '.txt';
    a.click();
    URL.revokeObjectURL(url);
    toast(uiLang==='ko'?'트랜스크립트 저장됨':'Transcript saved');
  }

  function clearTranscriptLog() {
    activeLangs.forEach(l=>{
      const log=document.getElementById('log-'+l);
      if(log) log.innerHTML='';
      const hint=document.getElementById('hint-'+l);
      if(hint) hint.style.display='';
    });
    enTranscript=[];
    document.getElementById('saveTranscriptBtn').style.display='none';
    document.getElementById('sentLbl').textContent='';
    document.getElementById('lastTime').textContent='';
    toast(uiLang==='ko'?'기록이 삭제됐습니다':'Log cleared');
  }

  fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:'ping',langs:['ko']})})
    .then(()=>{document.getElementById('sDot').style.cssText='background:var(--green)';document.getElementById('sTxt').textContent=uiLang==='ko'?'서버 연결됨':'Server online';document.getElementById('sPill').classList.add('ok');})
    .catch(()=>{document.getElementById('sDot').style.cssText='background:var(--red)';document.getElementById('sTxt').textContent=uiLang==='ko'?'서버 오류':'Server error';document.getElementById('sPill').classList.add('err');});

  function copyText(t){navigator.clipboard.writeText(t);toast(uiLang==='ko'?'링크 복사됨':'Link copied');}
  function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2800);}
  document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter')doTranslate();});
</script>
</body>
</html>
